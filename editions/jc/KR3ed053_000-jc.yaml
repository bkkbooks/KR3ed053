front:
  text: 序古之長吏與民相親飢為之食寒為之衣水旱疾疫為之醫藥而調劑之用能循績丕懋仁聞遠覃長樂陳修園孝廉精軒岐術作令三輔適大水奉檄勘災恆山出其方試而輒效嗣丁丙艱旋里讀禮之暇因刊時方歌括時方妙用二書夫上醫醫國前人如狄懷英陸敬輿諸賢家居時率駢集驗方以自娛亦以救世物理論曰醫者非仁愛不可托也非聰明理達不可任也非廉潔淳良不可信也修園行將廣其道以究心民瘼希蹤古循吏者豈直以術衒售哉時嘉慶癸亥至日趙在田序醫有三貫通靈素及仲景諸經之旨藥到病瘳曰名醫講求唐宋以後方書按證施治功多過少曰時醫摽掠前醫套襲模稜以文其過迎合而得其名曰市醫醫之不同如此余友陳修園精通醫理閉門注經以正千古相沿之誤念當世名醫既不數覯市醫又不可與言唯於時醫中有誘掖無己之心仕保陽公餘著有時方歌括二卷時方妙用四卷出以示余余讀之或連篇累牘而不繁或寥寥數語而不漏一字一句皆古聖賢之心法從時即從古也爰為參訂圈點顏曰公餘醫錄慫恿授梓公之海內云
