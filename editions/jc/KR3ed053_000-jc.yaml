body:
  text: 小引辛酉歲余能南宮試蒙恩試令三輔適夏間大水奉檄勘災恆山以勞遘疾得寒厥證幾死病間自定湯服二服愈時恆山東北大為溫瘧患誤於藥者比比余憫之遂於公餘採時方一百八首韻為歌括出繕本付刀圭家按法療治多所全活越明年制府熊謙山先生見而許可曰子之意善矣然有方而不審其用則不足以活人且以殺人子蓋明方意而廣之適余丁內艱弗果今歲讀禮在籍謹體先生壽世壽民意續成四卷詩病原於一百八首中且余讀靈素宗仲景向有經方之注和者寥寥偶以時方出紙貴一時投時好也好在此曷弗導之以此時方固不逮於經方而以古法行之即與經方相表裡亦在乎用之之妙而已因顏曰時方妙用時嘉慶癸亥立春後一日修園陳念祖題
