body:
  text: 卷三血症吐血咳血咯血鼻衄齒衄眥衄大便血小便血血淋血崩經曰中焦受氣取汁變化而赤是謂血血之流溢半隨衝任而行於經絡半散於脈外而充肌腠皮毛若外有所感內有所傷則血不循經從上而湧則為吐血咳血咯血鼻衄齒衄舌衄從下而走則為大便血溺血婦人血崩其源則一或問諸書皆分別五臟六腑之血而施治茲何以籠統言之余曰五臟有血六腑無血觀剖諸獸腹心下夾脊包絡中多血肝內多血心脾肺腎中各有血六腑無血近時以吐血多者謂吐胃血皆耳食前醫之誤凡吐五臟血必死若吐衄崩下皆是經絡散行之血也或問既無分別何金匱以瀉心湯治心氣不足為吐衄乎曰百病不離於五臟六腑臟腑病以致血不循經而為吐衄崩下非吐衄崩下之血從臟腑中脫出也循經之經字作常字解時醫誤解謂歸脾湯引血歸脾脾能統血即是歸經害人無算余再為之喝醒一語曰隨者仍其隨之常行者仍其行之常散者仍其散之常充者仍其充之常血循經常之道路則無吐衄崩下之病矣千古無一人談及余於高士宗引而不發處細繹思論大為快事身熱脈大者難治身涼脈靜者易治若喘咳急而上氣逆脈見弦緊細數有勢不得臥者死一外感吐血先見頭痛惡寒發熱等症必取微汗則愈宜香蘇飲加荊芥穗一錢丹皮白芍各一錢五分三十五一夏令秋令感暑氣燥氣而吐血方治見咳嗽門不贅一內經云不遠熱則熱至血溢血泄之病生矣凡人不避暑熱及過食爆炙之物以致血熱妄行宜四生丸一日一瘀血而吐必先胸痛血色必紫或黑而成塊脈必滯澀宜四物湯加醋炒大黃桃仁丹皮香附各一錢五分如紫血盡鮮血見即用六君子湯加當歸調之九出高鼓峰心法一傷寒及溫病應發汗而不汗之內熱蓄血及鼻衄吐血不盡內余瘀血大便黑麵黃宜犀角地黃湯九十九高鼓峰心法於血症獨精其云除瘀血與傷寒外其餘俱屬七情餓飽勞力等因必見噁心驗症分明一味固元湯主之方用人參炙耆歸身甘草煨姜大棗白芍水煎服血症最繁以一方統治胡念齋深服之胡念齋云補藥可用溫藥亦須急加附桂炮姜隨宜一仁齋直指謂陽虛陰必走大吐大衄外有寒冷之狀可用理中湯加南木香或甘草乾薑湯其效更著又有飲食傷胃胃虛不能傳化其氣上逆亦能吐衄亦宜上二方余用甘草乾薑湯其乾薑炮黑加五味子二錢甚效從慎柔五書得來一內經云血氣者喜溫而惡寒寒則滯而不流溫則消而去之此數語為治血之要旨所以楊仁齋高鼓峰方法神驗即張景岳用熟地一兩澤瀉附子牛膝各一錢五分肉桂一錢炙甘草二錢水煎服名為鎮陰煎方雖駁雜而溫藥較多亦能奏效一褚氏遺書云血雖陰類運之者其陽和乎陽和二字指心肺而言也心肺之陽宜布如日月一出爝火無光凡諸般邪熱之氣俱除血無所擾則循行常道矣運之者三字更妙血不自運必藉氣以運之既已運矣則隨衝任而行於經絡散於脈外充於皮毛有經常之道可行何至妄行而為失血之症耶諸傢俱贊此二句之妙絕未能發明其旨甚矣醫道之難也高鼓峰雖未能悟到此旨而固元湯與之暗合慎柔和尚以保元陽為主亦不過取黃耆補氣以生血而亦與此旨暗合合之則效速二公所以名燥一時也余於此千慮一得不敢自秘保元湯七慎柔方無肉桂有煨姜三片黑棗二枚當歸補血湯六一血症有不宜剛燥之劑者或血虛煩渴徐熱睡寤不寧五心煩熱宜聖愈湯十八一舌上出血如孔鑽者煎香薷汁服外用槐花炒研摻蒲黃炭亦可摻之齒齦血出用生竹茹四兩醋浸一宿含之牙縫出血以紙維醮乾蟾酥少許於出血處按之立止滿口齒血出枸杞子為末煎湯漱之然後吞下根亦可鼻衄用生茅花或根一兩煎服以上症或統用甘露飲八十七滋腎丸九十四一血淋尿血用苧麻根十枚水煎服又用海螵蛸乾地黃赤茯苓各等分為末每服三錢以柏葉車前子煎湯下又用亂髮燒灰入麝香少許用米醋溫湯調下如痛不可忍以藕汁蘿蔔汁白蜜調下又房勞兼小便尿血宜鹿角膠半兩沒藥另研油頭髮繩各三錢為末茅根汁打面糊丸桐子大每服五十丸鹽湯下一下血先便後血為遠血用灶中黃土八錢甘草生地白朮熟附子阿膠黃芩各一錢五分水煎服名黃土湯下血先血後便為近血宜赤小豆三兩泡令出芽曬當歸一兩共為末以漿水服一錢五分日三服名赤小豆當歸散二方俱出金匱大便下血不止諸藥不效者宜濟生烏梅丸六十九一皮膚血汗宜郁李仁去皮研二錢以鵝梨汁調下又用人中白焙乾入麝香少許溫酒調服立效又用六味地黃湯加五味一錢麥門冬川續斷各二錢一諸竅出血宜頭髮敗棕陳蓮蓬各等分俱燒灰研每服三錢木香湯下一婦人血崩審其寒熱虛實照以上諸方擇用若脫血之頃不省人事大汗不止者宜參附湯貧者以當歸補血湯加熟附子二三錢一百零五一大吐大衄大崩之頃血若稍止急用獨參湯服服後聽其熟睡切勿驚醒則陰血復生矣癲狂癇癲者癡呆之狀哭笑無時語言無序其人當靜狂者罵詈不避親疏其人當動癇者忽然猝倒無知口角流涎手足抽掣或作五畜聲數刻即愈愈後即如平人作止有間斷所以名癇也皆痰火為病而癇病多由胎中受驚一觸而發也治宜調中服補北瀉南不必過求奇險脈實者吉沉細者凶一前症屬於實痰實火者宜滾痰丸六十三肝火之為害非泛常之藥所可療時賢葉天士獨得其秘急用當歸蘆薈丸每服三十丸一日兩三服不可遲疑敗事九十八一前症屬虛者宜磁砂丸二十六二加龍骨湯加鉛丹二錢或再加阿膠三錢二十二此二方神妙非可以思議及者一前症既愈即宜以和平之劑收功宜硃砂安神丸二十八消渴口渴不止為上消治以人參白虎湯食入即餓為中消治以調胃承氣湯飲一溲一為下消治以腎氣丸趙養葵大變其法謂治消無分上中下先以治腎為急以六味丸料一斤入肉桂一兩五味子一兩水煎六七碗恣意冷飲之熟睡而渴如失矣白虎承氣皆非所宜也喻嘉言曰腎者胃之關也關門不開則水無輸泄而為腫滿關門不閤則水無底止而為消渴金匱腎氣丸蒸動精水上承君火而止其下入之陽光彼症取其開此症取其閤一開一合具通天手眼子和詆之何其陋也又白茯苓丸治腎消方用白茯苓覆盆子黃連栝蔞根萆薢人參熟地黃元參各一兩石斛蛇床子各七錢半雞䏶胵三十具微炒共為細末煉蜜和搗三五百杵丸如梧子大每服三十丸食前磁石湯送下喻嘉言治驗加犀角一兩又以六味丸加犀角收功抄此與八味地黃丸一陰一陽相為表裡皆為神方脈宜數大忌虛小傷食傷食病必有胸悶吞酸噯腐腹脹腹痛等症直以平胃散如麥芽穀芽山楂神麯蘿蔔子消之或以所傷之物燒灰加入為引導如初傷時食尚在膈服此湯以手探吐如傷之已久腹滿拒按宜以三一承氣湯下之愈後服香砂六君子湯加乾薑調養若無吞酸噯腐等症但見頭痛惡寒發熱是外感症切不可誤用消導之品致外邪陷入變症百出傷寒不禁食故桂枝湯啜粥是開章第一義讀仲景書自明西北之人一遇頭痛惡寒發熱之症便云有食即服神麯山楂等藥往往誤事余為活人計不得不大聲疾呼也脈滑而實時書以右關之上為氣口謂氣口緊盛傷於食者妄也張景岳云偶病之人多有非食而疑食者曰某日曾食某物或某肉某面其日即病醫理不論虛實但聞此言且見胃口不開必先治食夫未病之人誰有不食豈必預為停食以待病至者斯可信其無食乎及其病也則或因勞倦或因風寒或因七情病發不測而且無脹無滯與食何干藥有對病而妄行剝削必反增病此斯道之莫須有也由此推之則凡無據無證而妄行胡猜者皆其類也良可慨矣黃履素著折肱漫錄云五穀皆養補脾氣之物一煅成炭反能消食者何蓋火能軟堅化物燼從火化故也諸炭能消食亦能傷脾功用不減于山楂神麯不可忽之以為食物而多服常服也愚按今人用白朮炒焦不知其傷脾地黃燒灰不知其傷腎當以先生之言正之瘧疾寒熱往來有定候一日一發者邪淺二日一發者邪深三日一發者邪更深先寒後熱者為順先熱後寒者為逆自子至午發者為陽自午至子發者為陰單寒無熱者名牡瘧為純陰病單熱無寒者為癉瘧為純陽病瘧病因勞而發者名勞瘧因食而發者名食瘧更有鬼瘧為祟病瘴瘧疾感嵐氣而成種種不同總以少陽一經為主以少陽居陰陽之界偏陰則寒多偏陽則熱多陰陽俱病則寒熱等單寒單熱為陰陽偏造具極即祟瘧瘴瘧亦陽氣之虛正虛不能勝邪內虛不能御外脾胃之陽虛不能熟腐水穀俱不離少陽一經瘧脈自弦浮弦表邪沉弦里邪遲弦屬寒數弦痰飲洪弦屬熱實弦食積久瘧之脈漸緩則愈弦緊則殆吐散雙弦代散莫救初起俱宜小柴胡湯一日一服五日必愈方中柴胡一味少則用四錢多則用八錢切不可少此一味神農推為上品久服延年益壽之藥自李東垣及李時珍之書行此藥之真面目漸掩張景岳新造五柴胡飲為散劑更屬無知妄作流毒非輕凡初起無汗去人參加桂枝三錢服後食熱粥溫覆微似汗則愈未愈再服之有利無弊切勿惑於淺人之說若發熱甚汗不出可加麻黃三錢如病家惑於邪說牢不可破即以杏仁紫蘇防風各三錢代麻黃服後溫覆微似汗不用食粥上下午瘧不必過分唯以寒多者屬陰盛加桂枝三錢生薑宜倍用之或再加吳萸三錢單寒無熱者亦用此法或去黃芩再加熟附子二錢熱多者屬陽盛加知母貝母各三錢汗多而大熱大渴者加生石膏五錢麥冬三錢粳米四錢單熱無寒者亦用此法或再加知母三錢先熱後寒者名痹瘧治同宜加桂枝二錢是從金匱白虎加桂枝湯中仿出鬼瘧脈乍大乍小加藿香二錢以香為天地之正氣正能勝邪也天麻三錢以天麻之形如魁芋有二十四子周環於外其苗名赤箭取弧矢以示威之義也瘴瘧加蒼朮藿香各二錢食瘧以平胃散採入柴胡一味為君融合二方為一方即前人複方法也勞瘧是虛人不能耐勞而病瘧宜小柴胡原方去半夏加栝蔞根二錢或佐以補中益氣湯一切瘧疾口渴俱去半夏加栝蔞根以生津液凡一切瘧疾欲急於取效俟三發之後以小柴胡湯加常山三錢寅時服渣再煎於辰時再服如吐任其吐去痰涎自愈時醫惑於俗傳本草謂常山是截瘧猛藥邪未盡而強截之多變他病此無稽之臆說也蓋常山從陰出陽為透邪外出之良藥仲景用其苗名為蜀漆今人用其根何嘗是強截之藥一久瘧不愈及三陰瘧三日一發者諸藥不效惟以白朮一兩或二兩加生薑五七錢水煎一杯於寅時服之渣再煎於上午再服如熱多者以當歸一兩餘代白朮如脾腎兩虛諸藥不效者用近效白朮湯一日兩服服到十日必愈書成友人自安徽回贈余醫書一帙乃張心在新著附經也中有三陽交於膽三陰交於脾三陽之瘧治膽三陰之瘧治脾句真是名言可佩此君若得名師益友而講論之將來為醫中一巨擘恨未悟其人一初病瘧世稱胎瘧纏綿難愈與痘疹之症本於胎毒無異宜六君子湯加草果烏梅或合小柴胡湯一久瘧不愈不必治瘧只以六君子湯補中益氣湯兼吞桂附八味丸調理半月無不痊愈今醫俱遵景岳法用何人飲休瘧飲方中以何首烏一味為主據云中和之道其實苦澀之品不能食入余屢見久服此藥多變出腫脹等病學者不可不知痢疾下痢穢濁膠黏似膿似血小腹隱痛欲便不便的裡急後重是也舊說偏寒偏熱主補主攻皆不可拘執唯所列死證數條緣時醫治不得法流連致死或過信前醫之說棄而不治坐視其死余目擊心傷日夜焦心從內經仲景言外之旨及散見於各條之下一一體認而參以所治之症大有所悟藥到病瘳厥效彰彰可紀請先言救逆之道而次及恆法一醫書云脈沉小者易治脈浮大者難療又云發熱不休者死此遵內經腸澼一論執一不通之過也余別有所悟脈浮為表邪浮而兼大是表邪浸於陽明之界而下利仲景有葛根湯等治法發熱不休非感冒風寒即是經絡不和宜用桂枝湯當歸四逆湯祛風寒以調經絡人參敗毒散加老米名倉廩湯亦是此意但藥力輕薄不能速效耳大抵初病治法發熱惡寒者香蘇飲加防風川芎以取微汗則愈重必用桂枝湯當歸四逆湯之類若寒熱往來多嘔者必用小柴胡湯若熱多而口渴者小柴胡湯去半夏加栝蔞根主之若發熱不惡寒裡急後重者以葛根黃芩黃連甘草湯照古法先煎葛根後煎諸藥日服二三劑必愈若用痢門方如芍藥湯之類其邪無不陷入變危者余深恨倪氏痢疾三方為殺人主具一醫書云腹痛不休者死按其治法不過用木香檳榔砂仁及消食行滯之品安能以救死症若果消渴口中熱胸腹脹滿堅實而拒按為實症三承氣湯可以擇用或以三一承氣湯代之若果不渴口中和脈遲小而無力或手足冷腹痛而喜按為虛寒症非四逆湯不可若腹痛而下痢重滯者再加生白芍三錢如腹痛不止虛煩而喜按脈弦者為肝邪剋土宜小建中湯服一時許即以小柴胡湯去黃芩加白芍藥繼之神效一醫書云下痢純血者死下痢如屋漏水者死按其治法不過用阿膠地榆槐花蒼朮之類安能以救死症如果下奔鮮血口渴便短裡急後重脈盛者為火症宜白頭翁湯一日二服虛人及產後加阿膠甘草亦有下鮮血而非火症者若血帶黯而成塊者屬熱者少屬寒者多俱宜從脈症細辨之若口中和脈細小便長手足冷者屬虛寒無疑宜以理中湯加灶心土八錢主之下血多者宜間服黃土湯一日二服三日漸愈蓋以脾胃如分金之爐理中湯分其清濁是治其本源也屋漏水即血水之黯滯不稠者為虛寒症誤用寒涼攻破所致若見咽痛語言無序半日必死亦用理中湯救之一醫書云能食者輕不能者重絕食者死發嘔者死蓋不能食有食滯即宜以平胃散加消導之藥若脾胃虛弱即宜用香砂六君子湯及理中湯健脾以運胃又有辨於其微者不飢而不思食者是脾病宜以上二方飢而不能食者是肝病宜烏梅丸至於絕食頻嘔即是噤口痢丹溪用人參石蓮肉黃連煎湯入生薑汁徐徐呷之只認作濕熱上衝之症故不效宜參上諸法治之若食入即吐不利於香砂橘半者宜用乾薑黃連黃芩湯苦辛以開拒格若胸滿而吐及乾嘔吐涎沫者宜吳茱萸湯溫鎮以和土木其效如神凡心下痞滿從仲景三瀉心湯及厚朴生薑甘草半夏人參湯等擇用如神一醫書云婦人新產即發痢者死余放金匱白頭翁湯加甘草阿膠之例可知產後宜照病用藥毫無顧忌又云小兒出痘後即發痢者死余以為不盡然大抵產後失於過溫致死痘後失於過寒致死俱因病而藥之不必泥於一說恆法一痢疾無外症惡症但見裡急後重便膿血者三日內俱宜芍藥湯六十一痢疾腹中撮痛或下血片及噤口惡痢諸藥不效者宜斗門秘傳方七十一痢疾不論新久以陳米湯送下香連丸三錢一日三服極驗至於久痢以四君子湯六君子湯補中益氣湯十全大補湯送下法本薛氏多效一久痢諸藥不效審其為虛脫不禁無餘邪者宜真人養臟湯七十五一久痢流連不愈愈而又作名為休息痢是堵澀太早餘邪未盡宜羊脂四錢白蠟三錢黃連末三錢白蜜八錢烏梅肉炒研末二錢血餘灰三錢煎攪為丸丸如桐子大以米飲送下三十丸日三服此孫真人法也又有服補中益氣湯不應反下鮮紫血塊者此久風成食泄風氣通於肝肝傷不能藏血也宜玉屏風散去白朮倍防風加羌活葛根升麻主之宜玉屏風散六十七一洞泄寒中注下水穀赤痢白痢食已即出食物不消者宜聖濟附子丸七十時疫修園新訂程山齡云時疫之症須知有來路兩條去路五條何謂來路兩條疫有在天者在人者如春應溫而反寒夏應熱而反涼秋應涼而反熱冬應寒而反溫非其時而有其氣自人受之皆從經絡而入或為頭痛發熱咳嗽或頸腫發大頭風之類斯在天之疫也若一人之病染及一室一室之病染及一鄉以及闔邑病氣穢氣互相傳染其氣從口鼻而入其見症憎寒壯熱胸膈飽悶吐黃涎乃在人之疫以氣相感與天無涉所謂來路兩條者此也夫在天之疫邪從經絡入寒多者治以辛溫宜五積散熱多者治以辛涼宜九味羌活湯審其氣虛不能作汗者宜人參敗毒散熱甚格邪不作汗者宜防風通聖散若發頤及大頭症是風火相乘而為毒宜防風通聖散加牛蒡子金銀花桔梗貝母栝蔞仁之類俾邪從經絡入者仍從經絡出此以發汗為去路也在人之疫邪從口鼻入或香蘇飲加玉竹川芎忍冬或神朮散加葛根蔥頭或藿香正氣散之類俾其從口鼻入者仍從口鼻出此以解穢為去路也至於經絡口鼻所受之邪傳於陽明之經則為自汗大渴大熱斑黃等症宜甘露飲生其津液以為勝邪回生之本甚者必用人參白虎湯以清陽明散漫之熱此以清火為去路也如入於胃腑則為譫語發狂大便實小腹拒按等症宜三一承氣湯下之或內有實熱外有實邪者宜防風通聖以兩解此方疫症第一良方用之得法不論新久頭頭是道此以攻下為去路也復有虛人患疫或病久變虛或誤治變虛須用四物湯四君子湯補中益氣湯等加減此以補養托邪為去路也要之疫症必從大汗而解人壯者不戰而汗人虛者必戰慄而後大汗汗未徹者俟七日後而又作汗以上五法該於發汗一法之中散邪是發汗正法而穢濁之氣襲經絡不以辛香解之則汗不出火邪內燔血乾津涸非清火則陰氣不滋而汗不出胃氣壅塞不攻其實則濁氣不解而汗不出汗由液化其出自陽其源自陰非補養陰陽則氣血不充而汗不出此發汗一法為治疫大關頭有汗則生無汗則死若治之失法或涸其汗源或強逼使汗皆枉其死也可不慎哉未汗宜陽脈忌陰脈已汗宜陰脈忌陽脈避疫法避疫之法惟在節欲節勞仍勿忍飢以受其氣膽為中正之官膽氣壯則十一經之氣賴以俱壯邪不能入醫統云男人病邪氣出於口女人病邪氣出於前陰其對坐之間必須識其向背或以雄黃塗鼻孔中從容察位而入暑症潔古謂動而得之為中熱靜而得之為中暑暑陰而熱陽未免稱名不正蓋夏日炎炎人觸之則生暑病即為中熱無非動以得之他若畏熱求涼涼襲於外則為發熱惡寒頭痛項強等症宜九味羌活湯以散之涼中於中則為吐瀉腸痛宜理中湯以溫之若兼煩躁則間用涼水調下大順散病雖作於暑月不得以暑病名之也大抵暑症辨法以口渴煩心溺赤身熱脈洪而虛為的輕者為傷以六一散蕩滌熱氣從小便而泄若暑熱閉鬱而無汗必用香薷飲發越陽氣徹上徹下解表兼利小便則愈重者為中大渴大汗宜白虎加人參湯主之或汗出身熱而兩足冷者是暑而挾濕宜白虎加蒼朮湯主之若中暑昏悶不醒並伏暑停食吐瀉用半夏四兩醋煮茯苓甘草各二兩共為末以生薑汁為丸如綠豆大每服五六十丸開水送下若昏憒不醒者研碎灌之立蘇此孫真人之神方也名消暑丸為暑症第一神方至於生脈散清暑益氣湯為暑傷元氣而立或預服以卻暑或病愈後以收功非暑病正方也六一散五十二香薷飲四十一清暑益氣湯九十六生脈散七十八濕病濕有從外入者有自內得者陰雨濕地皆從外入其症頭重腰冷一身盡重冷漿瓜果皆自內得其症泄瀉腹脹腸有水氣淋濁痰飲然外濕亦可漸入於內內濕亦有浸漬於外失此不治則鬱而為熱變症多端不可不察濕脈多緩是怠緩非和緩浮大者易治沉細小者難醫一內外濕總方宜二陳湯加蒼朮白朮羌活王之外濕加紫蘇防風豬苓澤瀉乾葛木瓜主之內濕加木通澤瀉砂仁木香食積加山楂麥芽枳實寒濕加乾薑濕熱加黃連黃芩熱輕者只用連翹檳榔時嚼亦妙八十二受濕腰痛其痛冷重沉著如帶五千錢宜腎著湯八十四白濁不止為濕熱下注婦人白帶亦然宜萆薢分清飲如婦人白帶加半夏芡實苡仁黃柏生白朮主之八十三一傷濕一身盡痛不可轉動宜一味白朮酒八十五一蒼朮多脂易黴而治濕與殭蠶死於風而治風驢皮動火製成阿膠而降火俱是造物妙處即大易所謂同氣相求內經所謂衰之以其屬是也蓋濕邪在人腸胃原自不安一得蒼朮氣味便與之合一氣從汗出味隨水穀下行先誘之而後攻之也頭痛大抵暫痛為邪久痛為虛邪則分寒熱而除之虛則審陰陽而補之然亦有久痛為邪所纏新痛因虛而發者當因脈證而辨之脈浮滑者生短澀者死一傷寒六經俱有頭痛太陽痛在腦後必連項強宜九味羌活湯加蔥白三根陽明痛在額前必連目眶宜升麻葛根湯少陽痛在側必兼兩脅痛多嘔宜逍遙散去白朮加半夏黃芩川芎太陰無頭痛然濕土動而生痰亦為頭痛宜二陳湯加制南星蒼朮川芎少陰頭痛脈細俱欲寐宜五積散加細辛附子厥陰頭痛如破乾嘔吐涎沫宜吳茱萸二錢人參一錢五分生薑四錢大棗四枚水煎服名吳茱萸湯一火邪頭痛火盛者宜竹葉石膏湯加減方見傷寒如火勢輕者只用辛涼之品火鬱發之之義也宜加味逍遙散加葛根二錢酒炒黃柏一錢薄荷五分四十八一氣實有痰或頭重眩暈用大黃酒炒三遍為末茶調三錢服此釜下抽薪之法也一偏頭痛宜二陳湯偏在右者宜沙參一兩酒炒黃芩黃連川芎防風制南星之類偏在左者加當歸一兩川芎白芍白芷柴胡防風之類八十二氣虛頭痛宜補中益氣湯少加川芎蔓荊子之類五一血虛頭痛宜四物湯倍川芎加黃柏知母少加蔓荊子細辛之類九當歸補血湯加鹿茸五錢水酒各半煎六一眉稜角痛宜半夏六錢生薑三片水煎調沉香末五分服一真頭痛痛甚腦盡痛手足寒至節不治然不忍坐視其死急灸百會吞黑錫丹三十一腎虛頭痛諸藥不效宜六味湯去丹澤加枸杞三錢炙甘草細辛各一錢川芎二錢肉蓯蓉三錢五分如命門火虛者用八味湯加減如上法十四一蒸法最效方用川芎半兩晚蠶砂二兩殭蠶如患者年歲之數以水五碗煎至三碗就砂鍋中以厚紙糊滿中間開錢大一孔取藥氣熏蒸痛處每日一次雖年久者三五次永不再發瘰癧普明子曰瘰癧者肝病也肝主筋肝經血燥有火則筋急而生瘰癧多生於耳前後者膽之部位膽與肝相表裡其初起即宜消瘰丸消散之不可用刀針及敷潰爛之藥若病久已經潰爛者外貼普救萬全膏內服消瘰丸並逍遙散自無不愈更宜戒惱怒斷煎炒及發氣閉氣諸物免致膿水淋漓漸成虛損患此者可毋戒歟新採消瘰丸此方奇效治愈者不可勝計予亦刻方普送矣元參蒸牡蠣煅醋淬貝母去心蒸各四兩共為末煉蜜為丸每服三錢開水下日一服愚按普明著醫學心悟一書逐未亡本用之鮮效唯此方平淡而神奇當共寶之但耳前後為少陽部位渠云肝之部位者誤也故改正之眩暈內經云上虛則眩又云腎虛則高搖髓海不足則腦轉耳鳴皆指不足而言仲景論眩以痰飲為先丹溪宗河間之說亦謂無痰不眩無火不暈皆指有餘而言前聖後賢何其相反至此不知此症不離於肝經云諸風掉眩皆屬於肝此風非外來之風指厥陰風木而言厥陰風木與少陽相火同居厥陰氣逆則風生而火發故河間以風火立論也風生必挾木勢而剋土土病則聚液而成痰故仲景以痰飲立論丹溪以痰火立論也然一身聚邪之處即為偏虛之處頭為諸陽之會相火得以逆行上僣者非上焦之虛而何腎為肝母腎主藏精精虛則髓海空而頭重故內經以上虛及腎虛髓海不足立論也言虛者言其病根言實者言其病象其實一以貫之也脈數熱多脈澀血少弦為肝風滑實痰責虛小氣虛大為病進一眩暈脈弦發熱或寒熱往來宜逍遙散加半夏天麻鉤藤主之四十八一眩暈脈數或滑實大小便閉胸脅作痛耳聾耳鳴多怒凡屬肝經實火宜當歸蘆薈丸此法從喻嘉言寓意草醫吳添宮之母一案得來一眩暈脈澀乃精氣不足欲榮其上必灌耳根宜六味地黃湯倍地黃去丹皮澤瀉加細辛炙甘草各一錢川芎二錢枸杞子三錢肉蓯蓉三錢半水煎服十四一脈虛細弱小是氣虛宜補中益氣湯加天麻半夏鉤藤五一脈弦而滑眩暈而嘔逆為痰飲宜澤瀉四錢白朮二錢水煎服或用二承湯加天麻合此二味一實火眩暈不可當宜大黃酒炒三遍研末茶調下二三錢一虛眩諸藥不效宜鹿茸五錢酒煎去滓入麝香少許服緣鹿茸生於頭以類相從也一眩暈大虛諸藥不效及虛人愈後調理俱宜正元丹二十桂附八味丸十五眼目眼目一症古有五輪八廓及七十二症之辨其實不足憑也業是科者庸妄固無論已而高明之士於實症則曰風曰火於虛症則曰肝血少曰腎水衰言之親切有味而施治則毫無少效且以增病余歷數交遊凡目痛者無不因醫而致瞽即有一二倖免者原為輕淺之病即不服藥亦愈於醫固無與也蓋此症除風火赤腫外障等症外而一切目視無光及昏黑倦視等症皆為陽虛心肺為上焦之陽心屬火火能燭物肺屬金金能鑑物二臟之陽不宣則火不能燭金不能鑑矣醫者不知以補血之藥滋肝以補水之藥滋腎下焦之陰愈盛則上焦之陽愈虛且令下焦陰氣上加於天白晝如夜爝火有光陰雲四合龍雷飛騰原欲滋陰以降火其實滋陰以助火火盛則遂增出赤腫紅絲胬肉羞明諸火象漸成廢疾矣予非專業此道不敢多言請向瞽者而詢其所服何藥所點何藥便得前車之鑑今於眼科所未載外搜出數方以救逐流之弊四君子湯一加肉蓯蓉川椒菟絲為丸治虛寒症豆腐一塊中挖一空入朴硝一二錢仍用豆腐蓋上蒸出水即以此水洗目效治實熱症桂附地黃丸十五當歸補血湯加鹿茸三錢六磁珠丸二十六還少丹以菊花湯送下十六初起翳障不可遽用點藥及一切洗藥蓋目不染塵藥汁入目亦見羞澀唯用潔淨開水以潔淨茶盞盛之用潔淨本色絹片乘熱淋洗洗後水混濁換水再洗洗至水清無垢方止如此數次即愈水內並不用藥名天然水水必煎沸者以熱能散風水能制火也耳聾腎開竅於耳固也而腎脈卻不能上頭腎與心交假道於心之腑以上耳中之穴曰聽宮小腸之經脈貫之為司聽之神所居之位其形如珠皮膜包裹真水若真水破而耳立聾有為大聲所振而聾者皮膜破也或聾或不聾者心腎不交也宜磁朱丸交媾水火有先耳鳴而後聾者腎虛不能開藏陰氣窒塞於陽竅也宜六味丸去丹皮重加磁石再加五味子龜板膠為丸令陰氣自盛於本宮不觸於陽竅若感冒暴聾總不外少陽一經足少陽膽脈繞耳輸手少陽三焦脈入於耳邪氣壅實聽官為其所掩宜逍遙散去白朮加黃芩半夏生薑玉竹大棗主之如風火交煽宜防風通聖散肝火熾盛宜蘆薈當歸丸尺脈弱者宜桂附地黃丸尺脈數者宜大補陰丸二丸俱加磁石菖蒲蓯蓉之類神而明之存乎其人非可以筆楮傳者浮大為風洪數為火洪大而實為風火尺數為陰火遲濡為腎虛疝氣疝者小腹睪丸為腫為痛是也其名有七曰寒疝囊冷結硬如石陰莖不舉或控睪丸而痛曰水疝腎囊腫痛陰汗時出或腫狀如水晶或囊癢而外出黃水曰筋疝陰莖腫脹或潰或膿或裡急筋縮或出白物曰血疝狀如黃瓜或小腹兩旁橫骨兩端約中俗云便癰曰氣疝上連腎區下及陰囊或因號哭忿怒則脹罷則氣散曰狐疝臥則入小腹行立則出小腹曰㿗疝陰囊腫縋如升如斗不癢不痛然亦不必拘者經云任脈為病男子內結七疝女子帶下瘕聚又曰足厥陰肝病丈夫㿉疝婦人少腹腫大抵任病肝病居多小腸病亦多各經亦間有之治之之法統以二陳湯加澤瀉豬苓白朮桂枝小茴香木通金鈴子主之餘少時初用疑為偶效後屢試屢驗方知其調氣之功甚鉅張景岳先得我心景岳云病名疝氣非無謂也蓋寒有寒氣熱有熱氣濕有濕氣逆有逆氣陷有陷氣在陽分則有氣中之氣在陰分則有血中之氣從寒熱虛實施治俱當兼用氣藥余此方化膀胱之氣而諸氣俱調其義詳於脹症宜參究之本脈牢急弱急不宜二陳湯加味外若寒甚者再加乾薑附子若熱極者加黃柏知母小便如膏者加石菖蒲萆薢氣上衝去白朮加肉桂吳茱萸當歸囊腫如水晶者加苡仁桑皮痛不可忍者恐瘀血為膿致潰加桃仁紅花乳香筋縮者加苡仁一兩木瓜二錢頑麻不痛者加川芎檳榔癢者加刺蒺藜三錢千金翼洗方治丈夫陰腫如斗核中痛雄黃末一兩礬石二兩甘草七錢水五碗煎二碗洗又於關元兩旁相去各三寸青脈上灸七壯即愈左灸左右灸右又灸外陵穴在臍左右各開一寸半灸疝立效永不再發痿症痿者兩足痿弱不能行也痿而不痛治宜獨取陽明陽明為五臟六腑之海主潤宗筋宗筋主束骨而利機關若陽明虛不能受水穀之氣而布化則五臟無所稟宗筋無所養而痿躄作矣若用辛熱風藥及蒸灸等法立危脈浮數可治虛弱難醫一痿症皆屬於熱宜虎潛丸二八三陽明為諸筋總會故取虎潛丸為主而足所以能健步者則在於骨三因方又取加減四筋丸為主以腎為筋骨之總司也方用肉蓯蓉牛膝木瓜鹿茸熟地五味子菟絲子各等分為末煉蜜丸桐子大每服十丸溫酒米飲下一痿症服前丸若氣虛多痰者間服六君子湯加黃柏蒼朮紫菀神農本經云紫菀主痿躄今人不讀聖經只知為治咳也二一瘦黑人血虛多火宜間服六味丸加黃柏蒼朮十四肥白人痰多氣虛宜間服當歸補血湯加竹瀝薑汁六泄瀉難經有五泄之分曰胃泄脾泄大腸泄小腸泄大瘕泄即痢疾其實不必泥也總以虛實久暫為辨脈小手足寒難已脈小手足溫易已泄而脫血難治泄而脈大難治一內經云濕勝則濡泄此為瀉病之總論宜平胃散加茯苓豬苓澤瀉白朮桂枝名胃苓湯統治諸瀉如神八十口中熱溺赤下瀉腸垢為濕熱去桂枝加防風黃連一錢溺清口中和下利清穀為濕寒加乾薑二錢胸滿痞悶噯腐吞酸瀉下臭穢為食積加山楂麥芽食少便頻面色㿠白為脾虛去厚朴加人參乾薑五更天明依時作瀉或臍下痛為腎虛去陳皮厚朴加補骨脂三錢吳茱萸五味子熟附子各一錢一忽然大瀉不止大汗大喘手足厥冷兼吐者須防脾腎之氣暴脫夏月伏陰在內最多此症若服藿香香薷必死急用附子理中湯大劑一內經云諸病暴注皆屬於熱然必有熱症熱脈可憑不可以涼藥姑試宜香連丸八十九六一散五十一一內經云清氣在下則生飧泄須用升清法宜補中益氣湯去當歸加木香乾葛五分一內經云春傷於風夏生飧泄又云久風生飧泄宜神術湯七十八聖濟附子丸七十一久瀉愈而又作瀉時腹痛諸藥不效此痼冷在腸間必先取去然後調治宜平胃散去蒼朮加乾薑肉桂附子各一錢半大黃八分水煎服法本千金八十或用溫脾湯五五久瀉諸藥不效有臟熱腸寒臟寒腸熱之辨微乎微乎余詳於從眾錄等書茲用仲景烏梅丸每服二錢米飲下日三服半月愈又冬瀉有用肉蓯蓉鹿角霜當歸鬚等法有用芩連甘草葛根等法有用阿膠羊脂乳酥黃連末蜂蜜熬膏等法此理更微可以心會不可以言傳喻嘉言頗得其秘一五更泄名脾腎瀉及虛人時常作瀉必以溫補腎元為主宜回神丸加白朮人參乾薑附子茯苓罌粟殼煉蜜丸朝服三錢臨睡服五錢米飲送下七十二
