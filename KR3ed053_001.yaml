body:
  text: 卷一望色一明堂圖內部十四外部十一恐倉卒間不能辨也唯相傳額心鼻脾左頰肝右頰肺顧腎之法簡捷可從又須審其五色以定五臟之病肝青肺白心赤脾黃腎黑色周於面者辨其有神無神色分於部者審其相生相剋暗淡者病從內生紫濁者邪自外受郁多憔悴病久瘦黃山根明亮須知欲愈之疴環口黑黧休醫已絶之腎言難盡意醫要會心經云赤欲如帛裹朱不欲如赭白欲如鵝羽不欲如鹽青欲如蒼璧之澤不欲如藍黃欲如羅裹雄黃不欲如黃土黑欲如重漆色不欲如地蒼青如翠羽者生赤如鵝冠者生黃如蟹腹者生白如豕膏者生黑如鳥羽者生靈樞曰五色各見其部察其浮沉以知淺深察其澤夭以觀成敗察其散摶音團以知遠近視色上下以知病處積神於心以知往令望色二尸臭肉絶舌卷及囊縮肝絶口不合脾絶肌腫唇反胃絶髮直齒枯骨絶遺尿腎絶毛焦肺絶面黑直視目瞑不見陰絶目眶陷目系傾汗出如珠陽絶手撤戴眼太陽絶病後喘瀉脾肺將絶目正圓痓不治吐沫面赤面青黑唇青人中滿發與眉衝起爪甲下肉黑手掌無紋臍突足趺腫聲如鼾睡脈沉無根面青伏眼目盲汗出如油以上肝絶八日死眉傾膽絶手足爪甲青或脫落呼罵不休筋絶八日死眉息回視心絶立死髮直如麻不得屈伸自汗不止小腸絶六日死口冷足腫腹熱臚脹泄利無時肺絶五日死脊骨疼腫身重不可轉側胃絶五日死耳干舌腫溺血大便赤泄肉絶九日死口張氣出不反肺絶二日死泄利無度大腸絶齒乾枯面黑目黃腰欲折自汗腎絶望色三舌上津津如常邪尚在表見白苔而滑邪在半表半裡見黃苔而乾燥熱已入於裡見黑苔有二如黑而焦裂硬刺者為火極似炭之熱苔如黑而有水軟潤而滑者為水來剋火之寒苔又藍色為白色之變為寒紫色為紅色之變為熱此傷寒症辨法也凡舌腫脹重舌木舌舌生芒刺舌苔黃燥皆熱甚也凡舌硬舌強舌短縮舌卷皆危症又陰陽易出舌數寸者死若沿邊缺陷如鋸齒者不治杜青碧三十六舌繁而無當不可為其所惑聞聲難經曰聞其五音以知其病以五臟有五聲以合於五音謂肝呼應角心言應徵脾歌應宮肺哭應商腎聲應羽是也然此義深奧非尋常所能揣測者今以古人經驗簡易之法列為聲診脈之呻者痛也言診時之呻吟言遲者風也遲則寒溫風痰之症聲從室中言此中氣有濕也言將終乃復言者此奪氣也謂氣不續言未終止而又言之狀也衣被不斂言語罵詈不避親疏者神明之出也狂出言懶怯先輕後重此內傷中氣也出言壯厲先重後輕是外感邪盛也攢眉呻吟苦頭痛也呻吟不能行起腰足痛也叫喊以手按心中脘痛也呻吟不能轉身腰痛也搖頭而呻以手捫腮唇齒痛也行遲而呻者腰腳痛也診時吁氣者鬱結也紐而呻者腹痛也形羸聲啞癆瘵之不治者咽中有肺花瘡也暴啞者風痰伏火或暴怒叫喊所致也聲嘶血敗久病不治也坐而氣促痰火為哮也久病氣促危也中年人聲濁者痰火也診時獨言獨語首尾不應思慮傷神也傷寒壞病聲啞為狐惑上唇有瘡蟲食其臟下唇有瘡蟲食其肛也氣促喘息不足以息者虛甚也平人無寒熱短氣不足以息者實也實者是痰與火也新病間厄非火逆即寒逆久病間厄胃氣欲絶也大抵聲音清亮不異於平時為吉問症凡診病必先問是何人或男或女或老或幼或妾婢童僕問而不答必耳聾須詢其左右平素何如否則病久或汗下致聾問而懶答或點頭皆中虛昏憒不知人非暴厥即久病也如婦人多中氣診婦人必當問月信如何寡婦血氣凝滯兩尺多滑不可誤斷為胎室女亦有之又問其病於何日日少為新病實症居多日多為久病虛症居多曾食何物食冰而病藥用冰煎若傷肉食用草果山楂之類詳傷食本條曾有怒勞房欲等事怒則傷肝勞則內傷元氣房勞則傷腎及問初起何症如初起頭疼發熱惡寒屬外感如初起心腹疼痛及瀉痢等症屬內傷後變何病如痢變瀉變瘧為輕瘧瀉變痢為重先喘後脹病在肺先脹後喘病在脾先渴後嘔為停水之類今口渴思飲否口不渴內無熱也口渴欲飲為熱老人口乾不須飲主津液少苦漱水不欲咽主蓄血主陰極發躁喜熱喜冷否喜熱內寒喜冷內熱口中何味苦熱鹹寒虛淡甘脾熱成疳傷食口酸思食否傷食不思食雜症思食為有胃氣則生若絶食為無胃氣則死五味中喜食何味喜甘脾弱喜酸肝虛之類胸中寬否不寬傷食痰積氣滯之症及腹中有無痛處否無痛病不在內主虛有痛處主食積痰血之類有痛處手按則減者為虛大小便如常否小便祕黃赤為熱清白為寒濁如米泔為濕熱下陷大便祕為實久瀉久痢為虛下黃赤為熱下清白為寒足冷暖否足暖陽症足冷陰症乍冷乍溫便結屬陽大便如常屬虛及平日勞逸喜怒憂思及素食何物勞則氣散逸則氣滯喜傷心怒傷肝憂傷肺思慮傷脾恐傷腎素食厚味則生痰醇酒則發熱種種問法實為活人之捷徑切脈內經分配臟腑左寸心膻中左關肝膽左尺腎腹中右寸肺胸中右關脾胃右尺腎腹中王叔和分配臟腑左寸心小腸左關肝膽左尺腎膀胱右寸肺大腸右關脾胃右尺命門三焦李瀕湖分配臟腑左寸心膻中左關肝膽左尺腎膀胱小腸右寸肺胸中右關胃脾右尺腎大腸張景嶽分配臟腑左寸心膻中左關肝膽左尺腎膀胱大腸右寸肺胸中右關脾胃右尺腎小腸愚按大小二腸經無明訓其實尺裡以候腹腹者大小腸與膀胱俱在其中王叔和以大小二腸配於兩寸取心肺與二腸相表裡之義也李瀕湖以小腸配於左尺大腸配於右尺上下分屬之義也張景嶽以大腸宜配於左尺取金水相從之義小腸宜配於右尺取火歸火位之義也俱皆有至理當以病症相參如大便祕結右尺宜實今右尺反虛左尺反實便知金水同病也小便熱淋左尺宜數今左尺如常而右尺反數者便知相火熾盛也或兩尺如常而脈應兩寸者便知心移熱於小腸肺移熱於大腸也一家之說俱不可泥如此況右腎屬火即云命門亦何不可三焦鼎峙兩腎之間以應地運之右轉即借診於右尺亦何不可乎五臟平脈心脈浮大而散肺脈浮澀而短肝脈弦長而和脾脈緩大而敦腎脈沉軟而滑又有反關脈在關後必反其手診之當詢其平日何如脈象男女異脈男子陽為主兩寸常旺於尺女子陰為主兩尺常旺於寸乃其常也反之者病無病經脈經者常也醫者一呼一吸病者脈來四至為和平之象或問以五至為閏息如歲運三年一閏是我之息長非彼之脈數也脈分四時六氣十二月大寒至二月春分為初之氣厥陰風木主令經曰厥陰之至其脈弦春分至小滿為二之氣少陰君火主令經曰少陰之至其脈鉤小滿至六月大暑為三之氣少陽相火主令經曰少陽之至大而浮大暑至八月秋分為四之氣太陰濕土主令經曰太陰之至其脈沉秋分至十月小雪為五之氣陽明燥金主令經曰陽明之至短而澀小雪至十二月大寒為六之氣太陽寒水主令經曰太陽之至大而長按近時只遵春弦夏洪秋毛冬石四季之末和緩不忒之訣然氣之至有遲速不必趨於捷徑七怪脈歌舊訣雀啄連來三五啄連連摶指忽然止絶少頃復來如雀啄食肝絶也屋漏半日一點落如屋殘漏下半時一滴胃絶也彈石硬來尋即散沉於筋間劈劈急硬如指彈石腎絶也搭指散亂如解索指下散亂乍數乍疏如索之解脾絶也魚翔似有亦似無本不動而未強搖似有似無如魚之翔心絶也蝦游靜中跳一躍浮於指下始則冉冉不動少焉而去久之忽然一躍進退難尋如蝦之遊大腸絶也更有釜沸湧如羹浮於指下有出無入無復止數如釜湯沸肺絶也旦占夕死不須藥八脈該二十八字脈象舊訣以浮芤滑實弦緊洪為七表以沉微遲緩濡伏弱澀為八里以長短虛促結代牢動細為九道不無可議處浮沉遲數為診脈四大綱舊訣竟脫去數字謬甚當就李瀕湖李士材二十七字外更增入大脈方足然病無定情脈不單見學無頭緒指下茫然茲以浮沉遲數虛實大緩八脈為主而以兼見之脈附之總括以詩為切脈之捷法浮輕手乃得重手不見為陽為表除沉伏牢三脈之外皆可互見浮而中空為芤有邊無中如以指著蔥之象主失血浮而摶指為革中空外堅似以指按鼓皮之狀浮見也視芤脈中更空而外更堅主陰陽不交浮而不聚為散按之散而不聚來去不明主氣散詩曰浮為表脈病為陽輕手捫來指下彰芤似著蔥知血脫革如按鼓識陰亡孤陽越於上便知真陰竭於下矣從浮辨散形繚亂定散非浮氣敗傷除卻沉中牢伏象請君象外更參詳浮不沉也沉中諸脈俱不能兼沉輕手不得重手乃得按至肌肉以下為陰為里除浮革芤散四脈之外皆可互見沉而幾無為伏著骨始得較沉更甚主邪閉沉而有力為牢沉而強直摶指主內實詩曰沉為里脈病為陰淺按如無按要深伏則幽潛推骨認牢為徑直著筋尋須知諸伏新邪閉可悟諸牢內實尋除卻浮中芤革散許多活法巧從心沉不浮也浮中諸脈不能兼見遲一息三至或二至為在臟為寒除數緊促動四脈之外皆可互見遲而時止為結遲中而時有一止也但無定數主氣鬱血壅痰滯亦主氣血漸衰遲而更代為代緩中一止不能自還而更代也止有定數主氣絶亦主經墜有阻妊婦見之不妨詩曰遲為在臟亦為寒脈經云遲為寒仲景云遲為在臟一息未及四至彈一呼一吸合為一息一呼脈來二至一吸脈來二至合為一息四至為平人之脈遲則一息三至或一息二至至於一息一至必死結以偶停無定數遲中一止也代因不返即更端一臟氣絶其脈往而不能自還他臟因而更代之須知此脈止有定數共傳代主元陽絶還識結成鬱氣於除卻數中促緊動諸形互見細心觀遲不數也數中諸脈不能兼見數一息五六至為在腑為熱除遲結代三脈之外俱可互見數而牽轉為緊如牽繩轉索主寒邪而痛亦主表汗數而時止為促數中時有一止亦無定數主邪氣內陷數見關中為動形圓如豆厥厥搖動見於關部主陰陽相搏主氣與驚男亡陽女血崩詩曰數為腑脈熱居多仲景云數為在腑脈經云數為熱一息脈來五六科謂一息五六至也至七八至者危緊似轉繩寒甫閉動如搖豆氣違和數中時止名為促促里陽偏即是魔陽盛為促除卻遲中兼結代旁形側出細婆婆數不遲也遲中諸脈不能兼見虛不實也應指無力浮中沉三候俱有之前人謂豁然空大見於浮脈者非主虛有素稟不足因虛而生病者有邪氣不解因病而至虛者虛而沉小為弱沉細而軟按之乃得沉見主血虛亦分陰陽胃氣虛而浮小為濡如絮浮水面浮見主氣虛亦主外濕虛而模糊為微不顯也指下不分明若無若有浮中沉皆是主陰陽氣絶虛而勢滯為澀往來乾澀如輕刀刮竹之象主血虛亦主死血虛而形小為細形如蜘蛛絲之細指下分明主氣冷虛而形縮為短寸不通魚際尺不通尺澤主氣損亦主氣鬱詩曰虛來三候按如綿元氣難支豈偶然弱在沉中陰已竭濡居浮分氣之愆癆成脈隱微難見指下不分明病劇精幹澀遂傳冷氣蛛絲成細象以上皆言脈勢唯細大長短皆指脈形而言細者形如蛛絲也微與細相類但微對顯而言細對大而言分別在此短為形縮郁堪憐實不虛也應指有力浮中沉俱有之四言脈訣云牢甚則實獨附於沉脈者非大抵指下清楚而和緩為元氣之實指下逼逼而不清為邪氣之實主實實而流利為滑往來流利主血治亦主痰飲實而迢長為長上至魚際下至尺澤主氣治亦主陽盛陰虛實而湧沸為洪應指滿溢如群波湧起之象主熱極亦主內虛實而端直為弦狀如弓弦按之不移主肝邪亦主寒主痛詩曰實來有力象悠悠邪正全憑指下求脈來有力指下清而不濁滑長不兼洪弦之象正氣實也如指下濁而不清但見洪緊不見滑長是邪氣實也流利滑呈陰素足迢遙長見病當瘳洪如湧浪邪傳熱弦以張弓木作仇毫髮分途須默領非人渾不說緣由大即洪脈而兼脈形之闊大也舊本統於洪脈今分別之詩曰大脈如洪不是洪形兼洪闊不雷同絶無舞柳隨風態卻似移兵赴敵雄新病邪強知正怯夙疴外實必中空內經病進真堪佩總為陽明氣不充邪氣盛則胃氣衰故脈大而不緩緩脈來四至從容不迫主正復和緩之緩主正復怠緩之緩主中濕詩曰緩脈從容不迫時診來四至卻非遲胃陽恰似祥光布穀氣原如甘露滋不問陰陽欣得此任他久暫總相宜若還怠緩須當辨濕中脾經步履疲胃氣復則邪氣退故脈緩而不大緩者主脈之氣象從容不迫而言非指往來之遲緩也遲字對數字言遲則不數數則不遲也緩字所包者廣遲中有緩數中亦有緩非淺人所可領會故內經與大字對言不與數字對言其旨深哉節録病機賦修園重訂賦曰能窮浮沉遲數虛實大緩八脈之奧八者脈之奧也便知表裡寒熱盛衰邪正八要之名表者病不在內也里者病不在外也盛者本來氣血不衰也衰者本來氣血不盛也寒者臟腑積冷也熱者臟腑積熱也邪者非臟腑正病也正者非外邪所中也八脈為諸脈綱領八要是衆病權衡量度諸病申此八要也虛為氣血不實舉按無力若兼弱澀之象舉者輕手取之於皮膚之上按者重手按之於肌肉之內也無力者言指下舉按應指無力也弱者痿而不起也主氣虛澀者往來乾澀也主血少虛脈兼此二象實為氣血不虛舉按有力且該長滑之形長者過於本位也主氣有餘滑者流而不滯也主血有餘實脈兼此二象此以虛實二脈探氣血盛衰之情也遲寒數熱紀至數多少平人脈以四至為準不及曰遲一息三至也太過曰數一息六至也經云數則為熱遲則為寒此以遲數二脈別其寒熱也浮表沉里在指下重輕輕手舉之於皮膚上即得重按乃無如水浮泛者曰浮重手按至筋骨而得者曰沉經云浮為在表沉為在裡此以浮沉二脈別其表裡也緩則正復和若春風柳舞大則病進勢若秋水潮生緩則胃氣復如春柳之和故邪退而正復也病進而危故脈洪大如秋濤之洶湧此以緩大二脈驗其邪正也六脈同等者喜其勿藥六脈者兩手六部之脈也同等者脈息調勻不治自愈王肯堂誤解為大小浮沉遲數同等不可從也六脈偏盛者憂其採薪偏盛者六部中那一部獨異也又於那一部之中推其於八脈中見出那一象也王肯堂舊解亦誤脈有宜忌凡病內虛者脈弱為宜洪大則忌病外感者陽脈為宜陰脈則忌有神者吉和緩者吉合於時令者吉與面上五色中見那一色相生者吉反是者凶只此數語可遵其餘皆不經之言不可信也婦人脈法婦人兩尺盛於兩寸常也若腎脈微澀與浮或肝脈沉急或尺脈斷絶不勻皆經閉不調之候婦人尺脈微遲為居經月事三月一下血氣不足故也婦人三部浮沉正等無他病而經停者孕也尺大而旺亦然左尺洪大實為男右尺洪大實為女舊說以左右尺為斷然經云婦人手少陰脈動甚者妊子也今以寸脈動滑為斷左葉熊羆右應鸞鳳之兆體弱之婦尺內按之不絶便是有子月斷病多六脈不病亦為有子所以然者體弱而脈難顯也脈經曰三部浮沉正等按之無絶者孕娠也何常拘於洪滑耶陰搏陽別謂之有子言尺內陰脈摶指與寸口陽脈迥別其中有陽象也婦人不月脈來滑疾重手按之散者胎已三月也和滑而代者二月餘之胎息也重手按之滑疾不散者五月也婦人經斷有嘔其脈弦者後必大下不成胎也然有因病脈弦又當保胎為務氣旺則弦自退矣陰虛陽搏謂之崩言尺內虛大弦數皆內崩而血下妊娠七八月脈實勞強大者吉沉細者難産而死女人得革脈曰半産漏下得離經之脈曰産期離經者離乎經常之脈也蓋胎動於中脈亂於外勢之必至也新産傷陰出血不止尺脈不能上關者死婦人脈平而虛者乳子也婦人尺脈弱而澀小腹冷惡寒年少得之為無子年大得之為絶産小兒脈法小兒五歲以下血氣未盛經脈未充無以別其脈象故以食指絡脈之象彰於外者察之食指第一節寅位為風關第二節卯位為氣關第三節辰位為命關以男女左右為則紋色紫曰熱紅曰傷寒青曰驚風白曰疳疾淡黃隱隱為無病黑色曰危在風關為輕氣關為重命關為危脈紋入掌為內釣紋彎里為風寒紋彎外為食積及五歲以上乃以一指取寸關尺之處常以六至為率加則為熱減則為寒皆如診大人法小兒脈亂身熱汗出不食食即吐多為變蒸小兒四末獨冷鼓栗惡寒面赤氣粗涕淚交至必為痘疹半歲以下於額前眉端髮際之間以名中食三指候之食指近發為上名指近眉為下中指為中三指俱熱外感於風鼻塞嗽咳三指俱冷外感於寒內傷飲食發熱吐瀉食中二指熱主上熱下冷名中二指熱主夾驚食指熱主食滯中風猝倒無知牙關緊閉痰涎上壅危在頃刻是也李東垣主氣虛劉河間主火盛朱丹溪主濕盛生痰三子皆言中風之因如作文之推原法薛立齊趙養葵言真水竭真火虛肝鬱脾傷及諸虛所致更推廣言之總非正面文字其曰風者主外來之邪風而言也其曰中者如矢石之中於人也此時因風治風尚恐不及其他奚論焉小續命湯為第一諸說不足憑也若謂是氣虛火盛痰多水竭火虛肝鬱脾傷及諸虛所致為病日久即未中風之前以大劑調養非一兩月不效豈於既中風之際死生只在頃刻尚可以一劑回其氣虛平其火勢清其痰源滋其腎水溫其命火及疏肝健脾補養諸虛乎必無是理也如牛黃腦麝及市上馳名丸藥人尚知其劫傷元氣不敢輕投而數家之書言似近理其實僞君子之為害更甚於真小人念祖為活人計不敢不得罪前人而直辨其非脈喜浮大浮者邪尚在腑也大者風為陽邪陽症見陽脈也若浮大鼓指恐邪盛正衰元氣欲脫忌沉小沉者邪入臟也小者正氣衰也其沉小而氣度和緩來去分明乃是吉兆中經有六經之形證宜小續命湯三十二中臟多滯九竅故有唇緩失音鼻塞耳聾目瞀便祕之症風自外來故不外麻桂手足抽掣故兼用歸芍二便阻隔故用滑石硝黃宜防風通聖散五十六中腑多著四肢故有半身不遂手足不隨左癱右瘓之形中血脈外無六經之形症內無便弱之阻隔唯口眼喎斜或左或右偏左宜六君子湯蓋左半雖血為主非氣以統之則不流也二偏右宜四物湯蓋右半雖氣為主非血以麗之則易散也九二湯俱加竹瀝薑汁以行經絡之痰再加殭蠶鉤藤天麻羚羊角以熄風活絡或加附子以固陰肉桂以通陽黃耆以勝風中風不語宜資壽解語湯三十九舌強不能言足廢不能行宜地黃飲子三十中風死症多是風中帶寒其症口開為心絶手撒為脾絶眼合為肝絶遺尿為腎絶聲如鼾睡為肺絶汗出如油為元氣內絶髮直目上視面赤如妝汗綴如珠法在不治用藥若遲數刻即死矣急用三生飲一兩加人參一兩一百零四按三生飲中近時附子俱以鹽醃過烏頭非四川産者無力愚用熟附子一兩乾薑五錢炙甘草四錢一服汗略止再服眼睛略動三服加人參三錢漸有生意必須半日服三劑中風愈後照劉朱李薛諸法緩緩調治之愚按開竅以驅風非是正法內經重在填竅金匱有侯氏黑散風引湯二方是補天手段或猝倒時痰涎如塞危在頃刻者三因白散極驗詳三字經方附小續命湯六經加減並針灸法如中風無汗惡寒依本方麻黃杏仁防風各加一倍又宜針至陰出血穴在足小指外側甲角針一分崑崙穴在足外踝後踝骨針透太溪如中風有汗惡風依本方桂枝芍藥杏仁各加一倍又宜針風府穴在項後入發一寸針入三分禁灸以上二症皆太陽經中風也如中風有汗身熱不惡寒依本方加石膏知母各二錢甘草再加一倍去附子如中風有汗身熱不惡風寒本方加葛根桂枝黃芩再加一倍宜針陷谷穴在足大趾次指外間骨節後陷中針入五分去陽明之賊兼刺厲兌穴在足大趾次趾端去爪甲如韭葉許以瀉陽明之實也以上二症皆陽明經中風也如中風無汗身涼依本方附子加一倍乾薑加二倍甘草加二倍又宜刺隱白穴在足大趾內側去爪甲角如韭葉去太陰之賊此太陰經中風也如中風有汗無熱依本方桂枝附子甘草各加一倍又宜針太溪穴在足內踝後跟骨上陷中針透崑崙此少陰經中風也如中風六經混淆系之於少陽或肢節蠻痛或麻木不仁依本方加羌活連翹又於少陽之經紀骨穴在足外踝上三寸灸五壯灸以引其熱取厥陰之井大敦穴在足大趾甲聚毛間刺以通其經此少陽厥陰經中風也新按受業侄鳳騰注諸書逐而散之風散即為氣散生而亦死茲法養以和之氣和即為風和死可回生為風症補千古所未及壬戌歲念祖在保陽供職制憲熊大人召診診得兩手脈厚而長唯左手兼些弦象兩寸略緊念祖謂脈厚得土之敦氣以厚道載厚福脈長壽亦長非諛語也但弦為風脈緊為痛脈緊在兩寸恐上半身有痹痛等症也大人云所言俱對但背上及手腕痛或愈或作約有五年餘指頭麻木十年前頗甚今略麻而不木矣念祖曰風在骨節而作痛妙在痛處痛是氣血與風邪相拒非若偏枯之不痛也書謂中指麻木三年內必有中風之患以中指屬手心主之經故也今拇指食指為甚特肺與大腸之氣不調不甚為害然必須治之於早也薛氏云服風藥以預防中風適以招風取中念祖師其意而不用其方擬用黃耆五物湯常服黃耆桂枝尖生芍藥以上各二錢生薑四錢大棗二枚擘水煎服昔人云人在風中而不見風猶魚在水中而不見水風即氣也人在氣交之中得風以生即宋儒所謂和風一至萬物皆春是也因風以害即釋氏所謂業風一吹金石烏有是也人身五臟而肝為風臟乃生死之門戶無病則風和而氣息脈息俱和不見其為風有病則風疾而氣息脈息亦疾遂露出風象甚至目直手足動搖抽掣汗出如珠痰涎如湧等症大顯出風象治之不及矣唯指頭麻木時或眩運時或歷節作痛病未甚而治之於先則肝得所養斯不為風病矣肝屬木而主春陽春有腳能去而亦能來別有所以留之之道吾於邵子之詩悟之內經云神在天為風又曰大氣舉之莊子云萬物以息相吹也孟夫子謂塞乎天地之間佛經以風輪主持大地異同處實有一貫之道焉茲方也認定肝為風臟取桂枝通肝陽芍藥滋肝陰陰陽不偏是為和氣亦即和風也盈天地間皆風而皆氣氣貴善養黃耆之補是養氣章勿忘工夫大棗之緩是養氣章勿助工夫且倍以生薑之雄烈所以還其剛大浩然之體段聖賢之一言一字包函萬有自可以互證而益明又擬丸方時常服食之方與救病之方不同故取和平之藥與五穀五菜同功古云藥以治病食以叢丸此方取義等於食物即勿藥意也熟地黃六兩於潛白朮六兩米泔浸一宿去皮切片飯上蒸懷山藥三兩生薑汁拌炒甘枸杞三兩隔紙烘川附子二兩炒上肉桂一兩去皮不見火研人參二兩飯上蒸軟切片隔紙烘研鹿茸去毛切片酥炙勿傷焦麥冬二兩紹酒潤曬烘五味子二兩鹽水浸炒味依制研末煉白蜜丸如桐子大用硃砂五錢研末為衣涼干每早以米湯送下三錢忌食蘿蔔蕓薹諸血生蒜此方與黃耆五物湯相表裡黃耆五物湯補氣以治風所重在肝肝為風臟風者天地之噫氣也氣和即風和鼓舞動蕩無有不周即孟子所謂塞乎天地之間是也此方補腎亦是養肝肝屬木為東方之生氣莊子云野馬也塵埃也生物之息以相吹也然而木生於水乙癸同源所重尤在於腎內經云腎藏志又云腎者作強之官夫曰作強則為剛大浩然之根本即孟子所謂夫志氣之帥是也聖賢言包萬有雖養氣章主學問而言而尊生之道亦在其中自漢醫後無一人談及鮮不以念祖之論為創其實有所本而言方中熟地補先天腎水白朮補後天脾土然欲補腎必先聚精故取枸杞函精氣之完足以佐熟地所不及欲補脾必先厚土故取山藥具土氣之沖和以佐白朮所不及而為脾腎之總根者則在命門命門之外為兩腎坎外之耦也兩腎之中為命門坎中之奇也方中附子入命門血分肉桂入命門氣分二藥溫養水臟為生生之本即邵康節先生所謂地下有雷聲春光彌宇宙是也又合生脈散人參五味麥冬之酸甘化陰俾辛熱之陽藥不僣再加鹿茸為血氣所長較無情之草木倍靈外以硃砂為衣者取其色赤入心內經云心藏神腎藏志朱子論語注云心之所之之謂志是也各家之說不足憑而內經為三墳之一證之聖經賢訓字字相符醫與儒原非二道也癆症前人分別名色最多其實鋪張語臨症之際反啓人多岐之惑大抵外感內傷七情過用皆能致之其症倦怠少食或常畏寒或常發熱或寒熱往來氣色日見憔悴肌肉日見消瘦即將入癆症之門若咳嗽不已吐血時止時來是既成癆症法在不治二症另立一門宜參看凡脈極大極小極虛皆癆也但漸緩則漸漸有生意若漸數則漸入死門若數而兼緊弦十不救一左右關俱弦死期不遠昔人謂此症服寒涼之藥必死愚以為不盡然火盛抽薪正不可無權宜之計火平即捨去亦何害哉且寒涼之藥不可久服人人俱知也唯滋陰降火及不涼不溫之品最足誤人余每遇癆病之家未診時見其案上有薛氏醫按景嶽全書醫方集解本草備要等書曰以麥門冬代茶則不復與診知其中於藥魔定其必死也余素不喜寒涼姑以寒涼方之不可棄者首列之肺痿聲嘶喉痹咳血煩躁宜滋腎丸九十四小便癃閉者亦宜之血熱妄行脈洪大身壯熱或吐血或衄血宜四生丸一目吐血便血婦人血崩血淋及傷寒斑黃未已而吐血者宜犀角地黃湯九十九骨蒸發熱日靜夜劇及婦人熱入血室胎前發熱者宜地骨皮散九十五午後發熱盜汗不止者宜當歸大黃湯六十五吐血衄血盈盆盈斗者忌驟用苦寒及辛溫之藥急用後方服後熟睡勿觸其醒則立可重生一夜復元宜獨參湯八胃中濕熱身黃溺赤口瘡牙床糜爛吐血衄血宜甘露飲八十七感秋燥之氣咳嗽不已宜瀉白散八十六感秋燥之氣灑淅惡寒寒已發熱漸至咳嗽誤以參木補之致肺中之熱無處可宣急奔大腸食入則不待運化而出食不入而腸中之垢亦隨氣奔出瀉痢不休宜以潤肺之藥兼潤其腸則源流俱清寒熱咳嗽泄利一劑俱止此喻嘉言得意之法也宜瀉白散去粳米如黃芩阿膠杏仁夢遺失精及夢與鬼交宜封髓丹七十四午後發熱腰痛足酸服六味丸不效者宜大補陰丸二十三氣上逆煩熱嘔吐若驚悸不眠宜溫膽湯加真阿膠棗仁九十氣膹郁之屬於肺者屬於肺之燥也諸痰喘嘔之屬於上者亦屬於肺之燥也宜清燥救肺湯七十六以上諸方雖曰寒涼卻能培養生氣為癆門不可少之方亦是權宜暫用為癆門不可恃之方癆字從火未有癆症而不發熱者世醫以若寒為戒謂滋陰一法最為妥當而不知此症多是陰盛為病滋陰是益其病也人皆曰陰虛則火動吾獨曰陰盛則火動何以言之心肺在上陽之位也胸中之陽宣布如日月一出爝火無光何有發熱之病唯下焦之陰氣一盛上干陽位足太陰脾之濕氣動而為水飲干於手太陰肺則咳嗽不已足少陰腎之寒氣動而為陰血干於手少陰心則吐血不休虛癆以此二症為提綱非陰盛所致而何且心肺之位如太空也下焦之陰氣上衝陰霾密布白晝亦如長夜不獨燈燭之火有光即腐草螢蟲俱能生光豈非陰盛火動之一證乎況人身中有龍雷之火非諸經之火可比然必陰雲四合而龍雷方得遂其奔騰之勢而烈日當空雷龍潛伏矣以下諸方皆退熱之良法學者須當細玩一仲景法以小建中湯為主方中桂枝生薑宣胸中之陽即所以除陰火也後人識見不及古人慮薑桂之熱只用溫補之品東垣云參耆甘草為瀉火之良藥又云甘溫除大熱視古方雖低一格猶有先民之矩矱宣肺陽則天氣清明地氣不能蒸濕而為云而龍雷之火不作為退熱一大法計八方保元湯七補中益氣湯五當歸補血湯六四君子湯一六君子湯二五味異功散四香砂六君子湯三歸脾湯二十一以上八方皆手足太陰之藥補也退熱進食除痰止血極驗唯咳嗽一症方由飲邪方中人參其味甘苦屬陰其質柔潤多液助濕非飲症所宜故仲景於咳嗽症去人參加乾薑五味或再加細辛三味為主寒熱燥濕之藥隨宜加入其法最妙不可不知如肺燥肺熱人參又為要藥宣心陽則離光普照爝火無光又為退熱一大法計十方附子理中湯一百零七近效朮附湯一百零六人參養榮湯十二聖愈湯十八正元丹二十二加龍骨湯三十二黑錫丹三十朮附湯一百零五耆附湯一百零五參附湯一百零五以上十方皆手足少陰之藥治驗同前通有流精氣扶元氣補火以攻水之妙但吐血症以理中湯照古法等分煎服神妙或照仁齊直指加木香當歸亦妙所以妙者血得暖則循行經絡乾薑與甘草並相之功也或用炙草四錢乾薑炮黑二錢三味子二錢煎服亦妙引火歸源用八味丸自薛立齊張景嶽以後皆奉為枕中之祕其實治標之法不可常服余每見久服滋陰之劑發熱日甚後醫翻前醫之案謂熱藥固不可用而以地黃滋陰之品倍用以制其毒則能引火歸源其熱氣退投以八味地黃湯等初服一二劑如神再服一二劑不甚見效再服三四劑虛症大作其熱如焚病家或疑桂附之誤而更醫或信任不疑而歸咎於附子之製法不佳其肉桂之産非道地視二藥如鴆遂以滋陰者枉其歸陰所以然之故千古無一人悟及余謂一一明之蓋陰氣居於陽位邪火因而竊動忽得桂附扶胸中之陽則邪火自然退聽而不敢動故初服而效至三四服而不效者習以為常也至五六服而發熱更甚者桂附陽藥之少不敵地黃一派陰藥之多也或曰數方中陰藥數倍於陽藥陽藥固掣肘而不盡其量宜其不效何以前效而後不效歟余曰此問正不可少箇中機關必須識破然後可以得病情凡陰藥性柔而行緩緩則相續而不絶陽藥性剛而行急急則迅發而無餘也胃如分金之爐一柔緩而逡巡不進一剛急而捷足先登入咽之後但見桂附之扶陽若忘地黃之滋陰故初服而效至於數服桂附雖烈無如前日之地黃等藥緩行未了又得新入之地黃以助之勢可相敵故三四服不甚見效乃服至五六劑而大發者奈何蓋以每日所服之桂附如火一發而無餘而同劑中之地黃等藥如水之漸注不驟之積日多些少之桂附安能與之為敵宜其服之增熱也天地間兩可之見最為誤事不可不知癆症愈後不可無調養之法丸劑優於湯藥宜八味地黃丸十四天王補心丹十三龜鹿二仙膏十七還少丹十七全鹿丸二十五八味地黃丸十五加味虎潛丸二十四附録慎柔五書凡久病服寒涼氣伐過多以至三陽氣衰痰凝氣滯以調元之劑治之陽氣一動則少陽先升少陽欲先出前有太陽後有陽明遏截不能伸少陽之氣至太陽太陽與之並則寒與陽明並則熱適成寒熱瘧狀非真瘧也其太陽氣達遂有傷風之狀鼻塞惡風寒之症見矣陽明氣達則有作瀉之症此時正當調脾補元分頭施治則舊病盡脫矣損病六脈俱數聲啞口中生瘡晝夜發熱無間經云數則脾氣虛此真陰虛也用四君加黃耆山藥蓮肉白芍五味子麥冬煎去頭煎不用止服第二三煎此為養脾陰祕法也服十餘日發熱漸退口瘡漸好方用丸劑如參苓白朮散亦去頭煎曬乾為末陳米鍋焦打糊為丸如緑豆大每日服三錢或上午一錢百沸湯下蓋煎去頭煎則燥氣盡遂成甘淡之味淡養胃氣微甘養脾陰師師相授之語毋輕忽焉愚按煎去頭煎不用黃履素諱承昊折眩漫録亦云神妙祕法又按以淡補脾之說余一時亦不能會悟後得徐靈胎書謂五味各有所屬味甘屬土然土實無味也故洪範論五行之味潤下作咸炎上作苦曲直作酸從革作辛皆即其物言之惟於土則曰稼穡作甘不指土而指土之所生者可知土本無味也無味即為淡淡者五味之所從出即土之正味也故味之淡者皆屬於土如茯苓山藥石斛之類是也五臟皆受氣於脾故脾為五臟之本五味皆托始於淡故淡為五味之本慎柔黃履素煎去頭煎取無味之味以補脾誠祕法也
