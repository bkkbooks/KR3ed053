body:
  text: 卷二腫腫者皮膚腫大也脹者心腹脹滿也臌者心腹痞滿而四肢瘦小昔人謂之蠱脹或心腹脹滿外實中空其象如鼓昔人謂之臌脹茲分為三門腫症從來有氣腫水腫之辨內經以按之窅而不起者為氣即起者為水後醫多反其說然氣滯水亦滯水行氣亦行正不必分總以不起為腫甚即起為腫輕腎囊及莖中腫大多死脈本沉若浮而弦宜發汗若浮而鼓指有力宜越脾湯若浮在皮外多死若沉而緊宜麻黃細辛附子之類若沉而緩易愈若沉而微細宜溫補初起面上微腫兩目下名臥蠶更腫些一身覺重滯微喘小便不利即腫症之漸宜香蘇飲加杏仁防風各三錢三十五如皮膚腫大氣喘小便不利宜五皮飲上腫宜發汗加蘇葉防風杏仁各三錢下腫宜利水加豬苓防己各二錢木通一錢小水多為陰水加附子乾薑各二錢白朮三錢川椒木香各一錢小便不利為陽水加防己豬苓知母各二錢凡脈虛人羸宜加白朮人參肉桂附子脈實人健加萊菔子枳殼各二錢凡畏風之甚宜加生黃耆三四錢或再加附子二錢八十如小便點滴俱無氣喘口不渴宜滋腎丸九十四如前藥不效宜用濟生腎氣丸藥料作湯服或前症愈後亦以此丸服一月收功濟生加減腎氣丸一百零九如服利水之藥而小便愈少者補中益氣湯首煎照常服二煎服後以手指探吐五愚按水腫病淺者照上法治之愈矣深者必遵金匱五水而治之余著有金匱淺注頗有發明風水由於外邪法宜發汗皮水者外邪已去經而入皮故不惡風病在皮間故內不脹而外如鼓皮病不涉於內故口不渴然水在於皮亦必從汗以泄之也石水病在臍下陰邪多沉於下法用麻黃附子甘草湯重在附子以破陰也黃汗者外邪傷心鬱熱成黃胸滿四肢頭面俱腫病在於上法用桂枝湯加黃耆啜熱粥以取微汗重在桂枝以化氣尤賴啜粥取汗以發內外交郁之邪也唯正水一症正內經所謂三陰結謂之水結則脈沉水屬陰則脈遲三陰結則下焦陰氣不復與胸中之陽相調水氣格陽則為喘其目窠如蠶一身盡腫可知金匱之論甚精徐忠可之注甚妙試節錄之金匱云寸口脈浮而遲浮脈則熱遲脈則潛熱潛相搏名曰沉趺陽脈浮而數浮脈即熱數脈即止熱止相搏名曰伏沉伏相搏名曰水沉則脈絡虛伏則小便難虛難相搏水走皮膚即為水矣徐忠可注云此段論正水之由也謂人身中健運不息所以成雲行雨施之用故人之汗以天地之雨名之人之氣以天地之疾風名之寸口脈主上猶之天道必下濟而光明故曰陰生於陽趺陽脈主下猶之地軸必上出而旋運故曰衛氣起於下焦今寸口脈浮而遲浮主熱乃又見遲遲者元氣潛於下也既見熱脈又見潛脈是熱為虛熱而潛為真潛故曰熱潛相搏名曰沉言其所下濟之元氣沉而不復舉也今趺陽脈浮而數浮主熱乃又見數數者衛氣止於下也既見熱脈又且止脈是於客氣為熱而真氣為止故曰熱止相搏名曰伏言其宜上出之衛氣伏而不能升也從上而下者不返而終沉從下而上者停止而久伏則旋運之氣幾乎熄矣熄則陰水乘之故曰沉伏相搏名曰水見非止客水也又恐人之不明乎沉伏之義故又曰絡脈者陰精陽氣所往來也寸口陽氣沉而在下則絡脈虛小便者水道之所從出也跌陽真氣止而在下氣有餘即是火火熱甚則小便難於是上不能運其水下不能出其水又焉能禁水之胡行亂走耶故曰虛難相搏水走皮膚即為水矣水者即身中之陰氣合水飲而橫溢也沉伏二義俱於浮脈見之非真明天地升降陰陽之道者其能道隻字耶此仲景所以為萬世師也徐忠可此注妙不可言獨惜仲景不立方忠可又不補出應用何方致世之患此者或死於庸醫之舟車丸神佑丸疏鑿飲子等方或死於明醫之實脾飲濟生腎氣丸補中益氣湯導水茯苓湯等方以挺與刃余又不忍坐視而不救故擬方於後消水聖愈湯治水第一方然必兩手脈浮而遲足趺陽脈浮而數診法絲毫不錯一服即驗五服全愈否則不可輕用此秘方也大道無私方不宜秘然黃帝有蘭臺之藏長桑有無泄之戒者一恐輕試之誤一恐泄天地之機也余出此方以俟一隅之反非謂一方可以統治斯病也天雄一錢制牡桂二錢去皮細辛一錢麻黃一錢五分甘草一錢炙生薑二錢大棗二枚知母二錢去皮水二杯半先煎麻黃吹去沫次入諸藥煮八分服日夜作三服當汗出如蟲行皮中即愈水盛者加防己二錢天雄補上焦之陽而下行入腎猶天造下濟而光明而又恐下濟之氣潛而不返故取細辛之一莖直上者以舉之牡桂暖下焦之水而上通於心猶地軸之上出而旋運而又恐其上出之氣止而不上故取麻黃之走而不守者以鼓之人身小天地唯健運不息所以有云行雨施之用若潛而不返則氣不外濡而絡脈虛故用薑棗甘草化氣生液以補絡脈若止而不上則氣聚為火而小便難故以知母滋陰化陽以通小便且知母治腫出之神農本草經而金匱治歷節風腳腫如脫與麻黃附子並用可以此例而明也此方即仲景桂甘薑棗麻辛附子湯加知母一味主治迥殊可知經方之變化如龍也野老某年八旬有奇傳予奇方用生金櫻根去粗皮一兩半吳風草三錢香菌極小團結者七枚水煎服一服小便即通而腫愈余細繹此方極妙麻黃大發汗而根又能止汗橘肉生痰壅氣而皮又能化痰順氣蠶因風而致僵反能驅風如神此大開大闔之道金櫻子之大澀小便即可悟其根之大通小便矣吳風草原名鹿銜草能除濕熱故素問與澤瀉白朮同用以治酒風更妙是小香菌一味此物本濕熱所化用之於除濕祛熱墜中同氣相感引藥力至於病所而諸藥之性一發則濕熱無餘地以自藏俱從小便而下矣此必異人所授遺下所謂禮失而求諸野也惜余未試脹此症與腫症相因者宜以治腫之法治之或內脹而外不腫者治法稍異心腹脹滿甚者宜平胃散為主氣鬱加麥芽香附各二錢傷食者加萊菔子山楂乾薑傷酒加乾葛三錢砂仁一錢痰多加茯苓三四錢多嘔加半夏生薑各三錢胸上脹不橫通而脹加木通茜草麥冬栝蔞貝母濁氣在上加柴胡半夏桔梗心下痞滿加黃連黃芩各一錢乾薑八分腹痛加生白芍三錢腹痛因大便不通者再加大黃二錢小便不通合五苓散若貼臍左右上下脹者脹必兼痛為衝脈逆而不舒去蒼朮加紅花歸芍柴桂治之若季脅兩旁兼小腹脹痛者乃厥陰內不交於少陰外不合於少陽加柴胡人參半夏桂枝當歸治之八十腹脹喜按者宜後四方附子理中湯一百零七虛寒補中益氣湯五脾土失調地氣不升六君子湯加乾薑二脾虛痰多腹脹香砂六君子湯三愚按以上諸法治而不應者必以膀胱為主喻嘉言云人身胸中空曠如太虛地氣上而為云必天氣降而為雨地氣始收藏不動誠會上焦如霧中焦如漚下焦如瀆之意則雲行雨施而後溝瀆皆盈水道通決乾坤有一番新景象此義首重膀胱一經經云膀胱者州都之官津液藏焉氣化則能出矣如人之飲酒無算而不醉者皆膀胱之氣化而出也膻中位於膈內膀胱位於腹中膀胱之氣化則空洞善容而膻中之氣得以下運若膀胱不化則腹已先脹膻中之氣安能下達耶然欲膀胱之氣化其權在於葆腎腎以膀胱為腑者也腎氣動必先注於膀胱屢動不已膀胱脹滿勢必連於胸膈其窒塞之狀不可名言腎氣不動則收藏愈固膀胱得以清淨無為而膻中之氣注之不盈矣膻中之氣下走既捷則不為牽引所亂而胸中曠若太空矣此論可為胸腹滿及痰飲症之金針臌症臌症多是氣虛中滿誤服枳樸寬脹之藥所致屬實者少屬虛者多臌症屬實者其來必暴有氣血食飲寒熱蟲之別辨症詳於心腹九種之中唯飲氣兩脅痛有水氣或嘔清水宜後三方酌其虛實加減用之備急丸五十三五積散四十二平胃散加減照前血臌加川芎桃仁蟲臌去甘草加黃連榧子乾薑或另服烏梅丸四十九日臌病屬虛者其來必漸若氣喘水氣盛者宜黑錫丹若腹大如箕四肢消瘦初因吐酸而起後吞吐皆酸宜附子理中丸加黃連若單腹脹初服劫奪之藥少效久用增張硬如鐵石昧者見之方謂何物邪氣若此之盛自明者觀之不過為猛藥所攻即以此身之元氣轉與此身為難首如驅良民為寇之比喻嘉言治有三法一曰培養宜朮附湯加乾薑陳皮一曰招納宜補中益氣湯加半夏一曰攻散宜桂甘薑棗麻細附子湯金匱枳朮湯二法分用互用可以救十中之三四朮附湯一百零五補中益氣湯五桂甘薑棗麻辛附子湯金匱枳朮湯俱出金匱方載醫訣外有血臌症醫書俱云是婦人之病唯喻嘉言謂男子恆有之面色萎黃有蟹爪紋路脈雖虛極而步履如故多怒善忘口燥便秘胸緊脅脹腹疼迨脹之既成腹大如箕遂不可救東南最多所以然者東海擅魚鹽之饒魚者甘美之味多食令人熱中鹽者鹹苦之味其性偏於走血血為陰象初與熱合不覺其病日久月增中焦沖和之氣亦漸為熱矣氣熱則結而血不流矣於是氣居血中血裹氣外一似婦人受孕者然至彌月時復如抱甕矣推而言之凡五方之膏梁粱味椒薑桂糈成熱中者皆其類也治之之法以六君子湯料加乾薑川芎防己為末以陳米荷葉煎湯泛丸每服三錢日兩服夜一服一月漸愈此執中央以運四旁法也六君子湯二腫脹症以疏鑿飲子舟車丸為禁劑濟生腎氣丸脹症亦須慎用噎膈反胃食不得入昔醫名噎食雖入咽及帶痰涎吐出為膈朝食暮吐暮食朝吐名翻胃丹溪主血液俱耗噎為上稿膈為下稿以四物湯加甘蔗汁蘆根汁牛乳之類為主薛立齋謂怫鬱傷脾以逍遙散左金丸歸脾湯六君子湯之類與六八味丸間服趙養葵充其說而歸於治腎以內經謂腎乃胃之關關門不利升降息矣關即氣交之中天之樞也故腎旺則胃陰充胃陰充則能食以大劑六味湯八味湯為主時賢高鼓峰楊乘六宗其法而變通之專取陽明以六味湯去丹澤伏苓加甘草枸杞生地當歸總使一派甘潤之藥以養胃陰胃陰上濟則賁門寬展而飲食進胃陰下達則幽門闌門滋潤而二便通十餘劑可愈入鏡經主內經三陽結謂之隔一語大變其法以隔食之人五七日不大便陳物不去則新物不納以三一承氣湯節次下之後用芝麻飲啜之則愈此數法皆從金匱大半夏湯中甘潤蜜水得來而卻遺去仲景以半夏為主而降衝脈之逆人參為輔而生既亡之液之義學者必於此而得其梧機而又審其寒熱虛實而施治則於噎膈之道思過半矣至於食入反出是中焦土寒下焦火虛以附子理中湯香砂六君子湯加乾薑八味地黃丸間服多效若食不得入必以黃連黃苓人參乾薑湯為主瀉心湯亦妙瘀血在膈飲熱湯及食椒姜而呃者宜加桃仁紅花之類吳茱萸湯不論噎膈反胃皆可用唯以嘔而胸滿為的證乾嘔吐涎沫頭痛亦為的證脈浮緩而滑沉緩而長皆可治弦澀短小為難醫藥方四物湯九逍遙散四十八左金丸八十八歸脾湯二十一六君子湯二六味丸十四八味丸十五三一承氣湯五十四附子理中湯一百零七香砂六君子湯治噎膈奇方牛犬二灰散不拘黃牛水牛但遇有狗放屎於牛屎上連二屎共取和勻候乾封固每用煅灰存性三錢以好苦酒調服後用真雲南棋子一枚男以白的女以黑的搗研極細仍用苦酒燉濃服之甘蔗飲取甘蔗去皮切錢瓷碗乘白米些少以水潤透米將蔗錢放米內仍用瓷碗蓋定慢火蒸熟成飯先取蔗錢與本人徐徐嘴咽蔗汁漫開喉嚨即食此飯為開膈之第一方即審症議藥二灰散不易得先用此法即以黑白棋子繼之再審症用藥以收全功一膈症湯飲不入口針合谷穴亦可開通治翻胃奇方斗門方用附子一個最大者按近日附子宜以開水俟溫和入附子泡去鹽一日二換湯泡三日取曬坐於磚上四面著火漸逼碎入生薑自然汁中又依前火逼干復淬之約生薑汁盡半碗許搗羅為末用粟米飲下一錢不過三服瘥續論膈噎症古今方法最緊遵之亦不甚驗以上論治未免太簡恐初學者領悟不來正欲續論以暢其旨適友人自安徽來遺予以張心在附經一書檢閱之下深喜其讀書有得可與共學適道也雖識荊俟諸異日而數千里神交不啻同堂時晤對請即以附經之原文演為問答未知心在以為然否問曰噎膈初起有食入打嗆而因不能下咽者肺氣上逆會厭不及蔽而氣喉為之病當用何藥余曰治以枇杷葉百合天門冬半夏阿膠甘草令治節行則逆者順矣然必佐以乾薑之開五味子之闔細辛之撥動神機令咽喉二竅得順其出入之常遂無嗆逆之患非熟於仲景書者不悟也問曰有食下如刀剺草勒胸痛畏食者胃之上口內腫而食管為之不利當用何藥余曰金銀花煮膏以米飲調下常服或白水牛喉焙乾研末佐之以金銀花能止痛消腫且味甘而質潤可滋胃脘之陰性寒而氣香又除鬱熱之閉也問曰每食必以飲送下者胃中之氣不上吸故食不能自下若非飲送即見阻滯應用何藥余曰胃氣不能上吸非人參之助胃不可得食阻滯非甘瀾水和白蜜之潤下不可且其阻滯者衝脈之為病非半夏不能降衝脈之逆仲景大半夏湯甚妙問曰有將食時必飲酒而後能食者胃氣鬱塞不開得酒之剽悍而始通應用何藥余曰宜平胃散料加香附麥芽半夏乾薑白豆蔻沙參川芎入羊肚內蒸熟曬乾又易羊肚如前法三次去羊肚為末以陳米湯送下三錢日二服以辛藥開結以香藥醒脾而製法之妙化其霸氣方不傷其陰氣經云陰者中之守也此方頗為合度問曰有肝逆膽橫小絡相厄兩脅時痛食入不犯肝膽之絡則下犯其小絡則土受木製不能納穀而因吐者病由木鬱而土因之亦郁應用何藥余曰宜用小柴胡湯遵原定分數折為小劑柴胡四錢半夏湯洗七次不可用礬煮黃芩人參炙甘草生薑各一錢五分大棗一個水煎加紫蘇旁小梗整用生竹茹各二錢橘皮內筋膜當歸鬚各一錢補虛清火解鬱通絡配合得法則各藥相得而益彰自不同他方之泛泛也問曰有胃火自盛食入則吐逆不已者應用何藥余曰食物不得入咽是火阻於上宜用黃連黃芩之大寒以瀉之大苦以降之更用人參以助胃俾胃喜於納食而急迎之入內然必用乾薑大辛大熱衝開其關方無拒格之患四味等分煎服仲景得意之方也如食既入咽隨即吐出是胃素有熱一得食物為兩熱相沖不能停留而即出宜大黃四錢甘草二錢為釜下抽薪之法此與黃連黃芩乾薑人參湯均是苦寒之劑而毫釐有千里之差況寒熱之相反乎問曰有朝食暮吐完穀不化必傾囊倒篋盡淨無存而後快者則食久反出無火之謂也應用何藥余曰此症用溫補法人人共知每服之而不效者有故當辨其為中焦無火與下焦無火中焦無火有二在陽明則胸滿宜吳茱萸湯在太陰則腹滿宜理中丸又恐此丸之過甘則甘草不妨減半恐其功之過緩不妨加入蓽茇附子吳茱萸半夏茯苓之類勿泥定成法也下焦無火亦有二在厥陰則吐食而兼酸腐亦宜吳萸湯又以川椒乾薑肉桂吳茱萸附子當歸川楝子人參沙參研末棗湯泛丸米飲送下三錢一日二服在少陰則吐食而兼水液宜真武湯倍生薑或以斗門方峻補之愈後宜腎氣丸倍桂附以收功又問以上諸症未至於槁皆足以至槁至口吐白沫便如羊矢津液枯竭營衛不行五臟不通則食全不入而病不可為矣未知先生尚有法可以救之否余曰津液即是真水水由氣化亦由火致推其所以枯竭之故非氣虛不能化之即火虛不能致之也今人不明其理以滋潤甘涼為生津養液實所以涸津液之源而速其死仲景云乾嘔吐涎沫吳茱萸湯主之雖非為噎膈症立論而聖言無所不包少陽症火逆於上其嘔有聲而不吐谷名為乾嘔若不吐谷而但吐涎沫名為乾嘔吐涎沫此症食全不入無谷可吐亦是乾嘔例津液生於穀氣絕食則津液已枯又吐出涎沫則津液遂竭盡無餘所以不能下滋腸胃糞如羊矢唯吳茱萸一湯大辛以開其格大苦以鎮其逆大甘以培其中且辛從甘以化陽苦從甘以化陰陰陽合而時雨降頃刻間有萬里沃澤之景象矣況又佐以人參之大生津液並以馴諸藥之性宜其為起死之靈丹也至於停痰瘀血阻塞胃口致食入之路滯礙者為有餘之症諸家之說不無可採毋庸修園之再贅也經又有上氣下蟲之症治以騾馬尿而未愈者似可以烏梅丸繼之言不盡意亦視乎人之善悟而已痰飲水氣上逆得陽煎熬則稠而成痰得陰凝聚則稀而為飲皆以脾腎二經為主以水歸於腎而受制於脾也金匱以痰飲懸飲溢飲支飲分四飲後人加留飲為五飲不知留飲即痰飲也唐宋以後名色愈多而治法愈亂茲舉數方為扼要之法凡痰脈多應於滑脈沉而弦者主懸飲內痛一痰飲諸方以二陳湯為通劑茲加減法仿金匱之意故取效倍於諸家二陳湯八十二久嗽氣短加桂枝一錢五分白朮二錢此從水道以化氣也或與腎氣丸互服停飲脅痛加白芥子一錢五分前胡二錢四肢腫身體疼重加生黃耆三錢防己二錢咳逆倚息氣短不得臥加木防己三錢桂枝人參各一錢五分水煎好入芒硝八分服心下有支飲其人若眩冒加澤瀉四錢白朮二錢咳嗽不已加乾薑細辛五味子以上俱仿金匱意加減火痰加海粉栝蔞仁黃芩海石寒痰加乾薑附子風痰加制南星天麻竹瀝薑汁燥痰加天冬玉竹栝蔞仁濕痰加白朮蒼朮郁痰加川芎貝母香附連翹虛痰加人參白朮實痰加旋覆花枳實食痰加萊菔子一實熱老痰變出怪症不可名狀宜礞石滾痰丸六十三中脘留伏痰飲臂痛難舉手足不得轉動宜指迷茯苓丸六十四按痰飲之病最多胸脅疼嘔逆神識不清及手足臂痛皆是大抵痰為陽邪隨氣所到其症變幻無常凡苦辛酸鹹及竹瀝薑汁童便皂角芒硝之類隨症可加入亦有虛者宜六君子湯桂苓甘術湯腎氣丸真武湯小半夏倍加茯苓湯等以扶元氣飲為陰邪唯停於心下脅下為脹為咳為悸為眩冒及溢於皮膚而為腫必以桂苓朮附加生薑汁之類使離照當空而群陰力能退避若以地黃麥冬五味附和其陰則陰霾沖逆肆空飲邪滔天莫救矣咳嗽咳嗽症方書最繁反啟人多疑之惑其實不若虛實二症實者外感風寒而發虛者內傷精氣而生也總不離乎水飲金匱以小青龍湯加減五方大有意義小柴胡湯自注云咳嗽去人參加乾薑五味子人多順口讀過余於此悟透全書之旨而得治咳嗽之秘鑰因集溢未詳大為恨事向著有金匱淺注等十種言之不厭於復業斯道者請鑑予之苦心焉實症方一外感風寒內挾水飲必咳嗽不已兼見頭痛發熱惡寒等症若外感重者宜香蘇飲加杏仁防風各二錢半夏乾薑各一錢五分五味子搗扁細辛各八分水煎服溫覆取微汗外感輕者宜二陳湯加細辛乾薑五味子杏仁前胡若二症面目浮腫俱加桑白皮三錢葶藶子八分微炒研末調服香蘇飲三十五二陳湯八十二一外感風寒咳嗽頗久每嗆兩脅牽痛發熱者或寒熱往來者宜逍遙散倍柴胡加半夏乾薑各一錢半五味子一錢四十八一夏月傷暑咳嗽自汗口渴小便赤短宜六一散滑石六錢甘草一錢加乾薑細辛五味子各一錢水煎服一秋間傷秋金燥氣皮毛灑淅惡寒寒已發熱漸生咳嗽咳嗽不已漸至瀉利宜瀉白散二劑合為一劑去粳米加黃芩阿膠各一錢五分乾薑一錢五味子細辛各五分水煎服此方加減庸醫必駭其雜能讀孫真人書者方知從五味子湯麥門冬湯二方得來也八十六以上咳嗽治之失法多至吐血癆傷虛症方一癆傷之人土氣日虛不能生金每至咳嗽惟補其中土則百病俱愈宜六君子湯加乾薑一錢五分五味子細辛各八分水煎服方中雖有人參久咳肺燥之人不忌也二一久嗽不已時見喘促者是肺腎俱虛天水不交之症宜附子理中湯加茯苓四錢細辛五味子各八分阿膠天門冬各三錢一百零七一咳嗽雖為肺病其標在肺其本在腎腎具水火水虛者滋之宜豬苓湯服四五劑後即服六味地黃丸加蛤蚧麥冬五味火虛者溫之宜真武湯去生薑加乾薑細辛五味子四五劑後即服桂附地黃丸數方俱以利水為主若讀張景岳書輩必謂補腎不可利水求正錄中有實漏卮之喻而不知咳嗽必挾飲邪標在肺而本在腎天不連地而連水也今於水道一利則上焦之水飲亦必下行源流俱清咳嗽自愈經云上焦如霧中焦如漚下焦如瀆但得三焦氣化水道通決則雲行雨施乾坤有一番新景象矣一經云肺惡寒又云形寒飲冷則傷肺仲景不用人參以參之性微寒也然此為新病而言若久嗽之人肺必乾燥且以多咳而牽引諸火而刑金人參又為要藥如病在金臟者宜清燥救肺湯如病在水臟者宜瓊玉膏一實症不可妄用虛症諸方恐留邪為患也而虛症定不可廢實症諸方以咳嗽必有所以致之者溯其得病之由而治之即治本之法也喘促喘者氣上衝而不得倚息也有內外實虛四症宜與痰飲咳嗽參看外則不離乎風寒內則不離乎水飲實則為肺脹虛則為腎虛宜分別治之脈宜浮滑忌短澀一外感風寒及傷暑傷燥方治詳於咳嗽門不贅一水飲之病小青龍湯為第一方若支飲內痛亦可暫用十棗湯如因支飲滿而氣閉氣閉則呼吸不能自如宜用葶藶大棗瀉肺湯今人畏不敢用多致因循誤事一咳而上氣為肺脹其人喘目如脫脈浮大者用麻黃三錢生石膏四錢半夏二錢甘草一錢生薑一錢五分大棗二枚水二杯半先煮麻黃去沫入諸藥煮八分服日二服即愈名越脾加半夏湯或咳嗽甚而煩躁者小青龍加生石膏四錢一腎虛氣喘方治詳於咳嗽門不贅一黑錫丹為氣喘必用之藥宜預製之以備急一喘症起於七情氣逆者宜四磨飲起於痰喘脹滿者宜蘇子降氣湯二方為喘症之良方四磨飲二十九蘇子降氣湯二十七一聖濟總錄云枸杞湯治氣短方用枸杞四錢薑棗水煎服又云紫蘇湯治卒氣短方用紫蘇四錢陳皮一錢棗二枚水酒各半煎服按二方同治氣短何以彼此懸殊而不知一治肺一治腎也肺主出氣皮毛為肺之合風寒客於皮毛則肺之竅道閉竅道閉則出氣不利而短故用紫蘇陳皮之辛以開之書中卒字一字大有意義腎主納氣腎虛則吸氣不能歸根而短故用枸杞之補腎精以填之與八味地黃丸同意但任專則效速所以舍彼而用此也過服辛燥等藥喘促愈盛者可用貞元飲然為緩劑若痰多喘甚者大忌之一喘氣諸家之說最雜近有張心在之論深合鄙意余所以數千里而神交之也心在云喘氣專在口也鼻息出入氣未始不至於口而專在口則喘矣天氣通於鼻一呼一吸吐故而納新果順其常則出心肺而入肝腎脾居中而轉運此句最精可以悟出絕妙心法何喘之有唯鼻失其職或肺壅竅塞不能上達其氣復返心脾而出於口或肺虛力弱不能下引其氣上到心脾而出於口則喘作焉皆肺之過也至若氣短症鼻氣有出無入能呼而不能吸則責在肝腎之絕肺不任咎矣哮症聖濟總錄名呷咳嗽而胸中多痰結於喉間偏與氣相擊隨其呼吸呀呷有聲用射干丸其方用射干半夏陳皮百部款冬花細辛干老薑五味子貝母茯苓郁李仁各一兩皂莢刮去皮子炙五錢共為末蜜丸桐子大空心以米飲下三十丸一日兩服脈喜浮滑忌短澀代散愚按哮喘之病寒邪伏於肺俞痰窠結於肺膜內外相應一遇風寒暑濕燥火六氣之傷即發傷酒傷食亦發動怒動氣亦發勞役房勞亦發一發則肺俞之寒氣與肺膜之濁痰狼狽相依窒塞關溢不容呼吸而呼吸正氣轉觸其痰鼾齁有聲非泛常之藥所能治故聖濟用前方之竣然體實者可用若虛弱之人宜用六君子湯料十兩加貝母二兩共研末以竹瀝四兩生薑汁一兩和勻拌之又拌又曬以九次為度每服三錢開水送下以竹瀝薑汁可以透窠囊也然內之濁痰盪滌雖為得法又必於潛伏為援之處斷其根株須用各家秘傳諸穴灸法如畏多者宜於夏月三伏中用張路玉外貼藥末余家傳有哮喘斷根神驗藥散其方載於修園新按入麝五分薑汁調塗肺俞膏肓百勞等穴塗後麻瞀疼痛切勿便去俟三柱香盡方去之十日後塗一次如此三次病根去矣哮喘辨症方治俱詳痰飲咳嗽喘促三門不贅心腹諸痛心為君主之官一痛手足青至節不治俗謂心痛者乃心胞絡痛或胃腕痛也昔人分為九種宜辨而治之一曰氣痛脈沉而澀乃七情之氣鬱滯所致宜七氣湯五十四微溫百合湯九十微涼一曰血痛脈浮沉俱澀其病如刺不可按捫或寒熱往來大便黑宜失笑散五十八三一承氣湯五十四此方雖竣而痛其便閉拒按者不得不用之如桂枝桃仁各三錢一曰痰痛即飲痛脈滑咳嗽痛連脅下或遊走無定宜傷寒十棗湯但此方近醫膽識不及不敢用宜二陳湯八十二加白芥子一錢五分皂角炒紫五分栝蔞三錢滾痰丸六十三諸藥不效大便閉者可暫用之一曰火痛脈數而實口渴面赤身熱便秘其痛或作或止宜金鈴子散九十二丹參湯九十二百合湯九十三或用梔子炒熟四錢良薑二錢研末名越桃散溫酒送下加味逍遙散送下左金丸二錢一曰冷痛脈遲而微細手足俱冷其痛綿綿不休宜附子理中湯加當歸肉桂木通吳萸子一曰虛痛即悸痛脈虛細小或短澀心下悸喜按得食少愈二便清利宜歸脾湯加石菖蒲一錢二十一當歸補血湯加肉桂一錢五分六一曰注痛入山林古廟古墓及感一切異氣而痛語言錯亂其脈乍大乍小兩手若出兩人宜平胃散加藿香二錢木香一錢調麝香七釐服以香者天地之正氣也正能勝邪一曰蟲痛脈如平人其痛忽來忽止聞肥甘之味更痛聞食而蟲頭上昂按摩稍止蟲驚而暫伏唇紅舌上有白花點宜附子理中湯去甘草加烏梅三枚川椒黃連各一錢五分黃柏肉桂當歸各一錢水煎服愈後宜服烏梅丸一百零七一曰食痛脈實而滑噯腐吞酸惡食腹脹其痛或有一條扛起者宜平胃散加麥芽穀芽山楂半夏各二錢脹甚者再加萊菔子生研三錢水煎服如初病食尚在膈中服此湯後即以手探吐之如腹脹滿拒按大便不通宜三一承氣湯下之八十又按以上九痛流傳已久不可不知而高士宗醫學真傳分各部用藥其法甚捷今重訂而節錄於下一當心之部位而痛俗云心痛非也乃心胞之絡不能旁達於脈故也宜香蘇飲加當歸四錢元胡索木通各一錢桂枝二錢酒水各半煎服紫蘇須用旁小梗整條不切碎更能通絡五十三一心脈之上則為胸膈胸膈痛乃上焦失職不能如霧之溉則胸痹而痛宜百合湯半劑加栝蔞皮貝母各三錢薤白八錢白蔻一錢五分水煎服九十三胸膈之下兩乳中間名曰膺胸膺胸痛乃肝血力虛氣不充於期門致衝任之血從膺胸而散則痛宜丹參飲半劑加當歸五錢白芍金銀花各三錢紅花川續斷各一錢酒水各半煎九十二一膺胸之下則為中脘中脘作痛手不可近乃內外不和外則寒氣凝於毛皮內則垢濁停於中脘當審其體之虛實而施治莫若以燈當痛處爆十餘點則寒結去而內外通便不痛矣若爆後痛仍不止實者宜五積散虛者宜加味香蘇飲五積散四十二香蘇飲加桂枝芍藥當歸各三錢細辛木通各一錢五分吳茱萸二錢水煎服方中紫蘇生薑細辛桂枝以驅外之凝寒吳茱萸陳皮木通以降內之濁垢歸芍香附甘草和其氣血安其中外頗合古法若虛甚者去紫蘇加黃耆三錢汗多者再加熟附子一錢五分一中脘之下當陽明胃土之間銅人圖中脘下一斗名建里穴時痛時止乃中土虛而胃氣不和若服行血消泄之劑過多便宜溫補但以手重按之則痛稍平此中土內虛虛而且寒之明驗也宜香砂六君子湯加乾薑二三錢三附子理中湯一百零七一乳下兩旁胸骨盡處痛者乃上下陰陽不和少陽樞轉不利也傷寒病中多有此症當助其樞轉和其氣血上下通調則愈矣宜逍遙散倍柴胡加生薑一錢五分四十八一大腹痛者乃太陰脾土之部痛在內而緩中土虛寒也宜理中湯倍人參痛兼內外而急脾絡不通也宜理中湯倍乾薑蓋脾之大絡名曰大包從經隧而外出於絡脈今脾絡滯而不行則內外皆痛理中湯倍乾薑服之不應者再加肉桂一錢五分木通一錢太陽篇云傷寒陽脈澀陰脈弦法當腹中急痛先與小建中湯不瘥者與小柴胡湯此先補益於內而後樞轉於外也一臍旁左右痛者乃衝脈病衝脈當臍左右若為寒氣所凝其衝脈之血不能上行外達則當臍左右而痛當用血分之藥使胞中之血通達肌表若用氣藥無裨也宜當歸四逆加生薑吳茱萸湯水酒各半煎服或用四物湯九去地黃加肉桂一錢生黃耆生薑各三錢炙甘草紅花各一錢水酒煎服一臍中痛不可忍喜按者腎氣虛寒也宜通脈四逆湯加白芍三錢若脈沉實口中熱渴腹滿拒按大便秘是有燥屎宜三一承氣湯五十四一臍下痛者乃少陰水臟太陽水腑不得陽熱之氣以施行致陰寒凝結而痛少陰水臟虛寒用真武湯溫之太陽水腑虛寒用桂枝湯加熟附子茯苓溫之按士材必讀云臍上痛屬脾臍下痛屬肝當臍痛屬腎此臆說也不可從又臍下痛有火逼膀胱小便不利而痛者宜五苓散亦有陰虛陽氣不化小便點滴俱無脹痛者宜通關丸有燥屎者辨法方治見上條通關丸五十一一小腹兩旁謂之少腹少腹痛乃厥陰肝臟之部又為胞中之血海蓋胞中之水主於少陰胞中之血主於厥陰也痛者厥陰肝氣不合胞中之血而上行也肝臟不虛者當疏通以使之上宜香蘇飲加柴胡三錢當歸白芍各二錢生橘葉三片肝臟虛者當補益以助其下宜烏梅丸以米湯送下二錢一日三服蓋厥陰不從標本從中見少陽之氣使厥陰上合乎少陽則不痛矣兩旁季脅痛者肝氣虛也當歸四逆湯加阿膠四君子湯去白朮加當歸粳米與烏梅丸五服兩脅之上痛者少陽之氣不和也宜小柴胡湯去棗加牡蠣青皮時法用左金丸愚按凡心腹諸痛宜辨其內之脹與不脹便之閉與不閉脈之有力與無力口中熱口中和痛之久暫以辨寒熱邪正虛實如痛而脹且閉者厚朴三物湯攻裡兼發熱者厚朴七物湯兼表裡治之腹痛連脅痛脈弦緊惡寒甚大便秘者大黃附子湯主之若但脹而便不秘者是實中之虛宜厚朴半夏人參生薑甘草湯腹痛甚而不可觸近嘔吐者大建中湯主之雷鳴切痛嘔吐者附子粳米湯主之腹痛下利而厥者通脈四逆湯主之腹痛吐瀉者理中湯主之若繞臍疼痛名寒疝腹中病痛者當歸生薑羊肉湯主之皆起死回生之法時醫不講久矣予著有金匱淺注十六卷醫訣三卷辨之頗詳宜查對勿誤痛風肢節走痛內經謂之賊風後人謂之痛風又謂之白虎歷節風宜審其寒熱而治之脈宜浮數忌虛弱痛風脈浮緊頭痛惡寒發熱為新受之邪宜五積散四十二治風先治血血行風自滅宜四物湯加生黃耆防風桂枝秦艽桑枝紅花炙草主之九痛風久不能愈必大補氣血以為勝邪之本切不可徒用風藥宜十全大補湯諸藥各一錢加真桑寄生三錢為君再加附子防風竹瀝生薑汁為佐使十一痛風久不愈以痛久必入絡也諸方俱宜加入金銀花木通紅花鉤鉤藤刺蒺藜之類又痛久則鬱鬱而瀉熱熱則生痰必加入制南星半夏栝蔞根黃柏貝母竹瀝薑汁之類又桑寄生虎骨俱為要藥以桑為箕星之精風從虎之義也久服辛熱之藥不效者宜用玉竹黑芝麻直殭蠶生耆歸鬚菊花蒺藜阿膠炙草之類為柔潤熄肝風法也痹痹者閉也風寒濕雜至合而為痹與痛風相似但風則陽受之痹則陰受之雖內經痹論風氣勝者為行痹寒氣勝者為痛痹濕氣勝者為著痹之分而深究其源自當以寒與濕為主蓋以風為陽邪寒與濕為陰邪陰主閉閉則鬱滯而為痛是痹不外寒與濕而寒與濕亦必假風以為之帥寒曰風寒濕曰風濕此三氣雜合之說也內經壽天剛柔篇曰在陽者命曰風在陰者命曰痹以此分別則兩症自不混治矣若胸痹及臟腑諸痹又當別論醫門法律分別甚詳宜參閱之一痹症之實者宜五積散四十二一金匱治血痹脈陰陽俱微寸口關上微尺中小緊外症身體不仁如風痹狀用黃耆五物湯黃耆芍藥桂枝各二錢生薑六錢大棗四枚水煎服一日三服愚謂為痹症屬虛者之總方
