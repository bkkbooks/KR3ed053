body:
  text: 卷四鶴膝風脛細而膝腫是也為風寒濕三氣合痹於膝而成初起發熱頭痛宜五積散痢後變成者亦宜之若久病為足三陰虛宜十全大補湯加附子牛膝杜仲防風羌活主之又治初起外法用陳年白芥子研末以薑汁蔥汁調塗一伏時患處起泡泡干脫皮自愈五積散四十二十全大補湯十一又按鶴膝風多是虛寒腳氣多是濕熱一攻一補治法各判然腳氣有腎虛氣喘小腹痹者腎氣丸必不可緩鶴膝風有赤熱焮腫者二妙散桂枝芍藥知母湯亦所必需此活法也腳氣腳之腫大是也東垣云南方卑濕其濕從外以襲入北方常食膻乳又飲酒太過脾胃有傷不能運化其濕從中以流下初起發熱惡寒似傷寒症若上氣喘急及上少腹不仁恐致攻心不救若患久不治即成痼矣此症名壅疾不可驟補一腳氣腫痛不可忍宜雞鳴散一百零八腳氣氣喘少腹不仁須防其入心宜後方腳氣服雞鳴散愈後亦宜之用桂附地黃丸十五一兩脛大為濕腳氣兩脛不腫或頑麻或攣急或緩縱名乾腳氣宜四物湯加牛膝獨活蒼朮黃柏木瓜澤瀉肉桂之類九積聚積者五臟所生推之不移屬陰聚者六腑所成推之則移屬陽當辨其新久虛實而施治內經云大積大聚不可犯也衰其大半而止過則死此治積聚之法也脈宜沉實忌虛弱一積聚新病審其可用發散者宜用五積散四十二一積聚新病審其可用消導攻下者宜用備急丸五十三平胃散加入萹蓄瞿麥炒大麥芽川芎以上八味各用五錢沉香木香各一錢五分大黃酒浸二兩共為細末每服三錢薑湯送下忌油膩動氣之物及房事一月藥須黃昏服勿食晚飯大小便見惡物為度八十肝之積在左脅下名曰肥氣去蒼朮加柴胡鱉甲青皮莪朮肺之積在右脅下名曰息賁加白豆蔻桑白皮鬱金心之積起臍上上至心下大如臂名曰伏梁去蒼朮加肉桂黃連石菖蒲莪朮脾之積在胃脘腹大如盤名曰痞氣原方不加減腎之積在臍下發於小腹上衝心而痛名曰奔豚上方去蒼朮大黃陳皮麥芽萹蓄加茯苓四兩肉桂附子當歸吳茱萸各五錢川楝子李根白皮膈一兩淡鹽湯送下或煉蜜為小丸吞下四錢更佳凡熱積加黃連黃芩寒積加薑桂附子酒積加葛根痰積加半夏水積加桑白皮赤小豆血積加桃仁紅花肉積加阿魏山楂果積加麝香草果一久病及虛弱之人不可徑用前藥或先服補藥然後攻之或攻藥去病之半而即補之或服攻藥三日服補藥一日神而明之存乎其人若愈後必以補藥收功宜六君子湯二香砂六君子湯三附子理中湯一百零七以上三方唯臍下動氣去白朮加肉桂一錢五分服攻藥大下積血自汗不止氣弱不能轉動者宜急進參附湯若貧者以當歸補血湯加附子三錢代之一百零五嘔吐噦厄聲與物俱出為嘔有物無聲為吐有聲無物為噦氣自臍下衝逆有聲聲短而頻古人名噦又名咳逆為厄方書命名各異今從俗本分名使人易曉脈陽緊陰數為吐陽浮而數亦吐寸緊尺澀胸滿而吐寸口脈數者吐緊而澀者難治緊而滑者吐逆脈弱而嘔小便復利身有微熱見厥者難治吐出色如青菜者危上四症皆屬氣逆有統治之法宜二陳湯隨症加減八十二如為寒氣所客脈遲畏寒加砂仁藿香乾姜如干嘔吐涎沫加人參一錢吳茱萸二錢大棗三枚倍生薑如食不得入為火阻於上加黃連黃芩人參如為飲食所傷吞酸噯腐加蒼朮藿香砂仁麥芽山楂如有聲無物加生竹茹二錢人參一錢旋覆花三錢代赭石一錢五分大棗二粒如吐酸水加吳茱萸一錢黃連五分如脾胃虛弱運化遲而嘔吐者加人參白朮砂仁木香如食已即吐是胃中有熱食入則兩熱相沖不得停留而吐若大便祕結可加大黃三錢若寒熱往來脅痛而嘔者為少陽症加人參黃芩各一錢柴胡三錢大棗二粒如驟然發厄者為胃火上衝加麥芽石斛麥冬枇杷葉竹茹扁豆各二錢久病發厄有脾虛腎虛之分脾虛者加參朮丁香柿蒂腎虛者加參附乾薑沉香巴戟天此症多死如吐蟲者去甘草加川椒人參吳茱萸黃連川楝子烏梅三粒粳米一百粒五淋癃閉淋病小便滴瀝澀痛欲去不去欲止不止是也古人分為五種石淋下如沙石膏淋下如膏脂勞淋從勞役而得氣淋氣滯不通臍下悶痛血淋瘀血停蓄莖中割痛皆為熱結膀胱所致而治者卻不重在膀胱而重在三焦經云膀胱者州都之官津液藏焉氣化則能出矣又云三焦者決瀆之官水道出焉此數語數百年來注傢俱誤不知津液為汗之源膀胱氣化則能出汗故仲景發汗法必取之太陽也水道為行水之道三焦得職則小水通調須知外出為膀胱之津液下出為三焦之水道也又有清心之法以心與小腸相表裡也又有清肝之法以肝主疏泄也又有補腎之法以腎為司水之臟也治三焦與膀胱之正法則用五淋散清心滋腎則用導赤散清肝則用龍膽瀉肝湯之類至於癃閉症小便點滴不通甚則脹悶欲死其病源亦同前症而治法更進一步有用八味丸倍桂附蒸動腎氣以開關者有用滋腎丸滋陰以化陽者有用補中益氣湯服後以手探吐者如滴水之器閉其上竅而倒懸之點滴不能下也去其上閉則下竅通矣有用五淋散加入麻黃杏仁以取微汗麻黃力猛能通陽氣於至陰之地下肺氣主皮毛配杏仁以降氣下達州都導水必自高原之義也有用人參麻黃各一兩水煎服者夏月不敢用麻黃有用紫蘇防風杏仁各三錢水煎服溫覆取微汗者有用白菊花根搗爛以生白酒沖和取汁溫飲者有用水母四兩葧薺十四粒水煎服者有用皂角蔥頭王不留行各數兩煎湯一盆令病者坐浸其中熏洗小腹下體久之熱氣內達壅滯自開而便通者務宜審其脈症而施治不可執一脈宜浮大忌細小五淋散五十通治五淋癃閉加減法氣淋加荊芥香附生麥芽血淋加牛膝桃仁紅花生地入麝香少許石淋送下六一散三錢膏淋合萆薢分清飲勞淋合補中益氣湯如過服金石藥與老人陽已痿思色以降其精致精內敗而為淋加萆薢石菖蒲菟絲子以導之六一散五十二石淋萆薢分清飲八十三膏淋導赤散四十九赤淋龍膽瀉肝湯九十七莖腫莖中痛甚宜之補中益氣湯五氣淋六味丸十四水虛八味丸十五冷淋濟生腎氣丸一百零二扶陽以化陰滋腎丸九十四滋陰以化陽四生丸一百血淋百合湯九十三氣淋續論三焦包羅臟腑主氣而即主水水由氣化也故曰決瀆之官水道出焉上焦如霧氣中有水也下焦如瀆水中有氣也中焦如漚氣水相函於其中也凡水道不通溢於外而為腫積於中而為脹凌於肺為咳嘔流於腸為泄瀉宜專責之三焦與他臟無涉時醫治他臟而幸效不可援以為例怔忡驚悸不眠健忘症治同高鼓峰曰怔忡血少也其原於腎水不足不能上升以致心火不能下降大劑歸脾湯去木香加麥冬五味枸杞吞都氣丸如怔忡而實挾包絡一種有餘之火兼痰者則加生地黃連川貝之類以清之按一症之治只此數語緣讀書臨症之多故能片言居要而胡念齊又補出胃絡不能上通症脾脈不能入心症宗氣虛而虛里穴動症水氣凌心症奔豚上乘症治法不甚相遠唯水氣與奔豚當另法治之愚謂水氣凌心輕則用小半夏湯倍加茯苓以泄之重則用茯苓桂枝甘草大棗湯以安之再重則用真武湯以鎮之奔豚則用桂枝湯加桂以泄之或黑錫丹以鎮之或用茯苓桂枝甘草大棗湯以緩之金匱奔㹠湯亦有意義烏梅丸亦可借用六味地黃丸加五味子名都氣丸十四婦人科婦人之病與男子同唯經帶胎前産後另有方法一妊婦患傷寒雜病俱以四物湯為主無汗加麻黃細辛有汗加桂甘草寒熱往來加柴胡黃芩鼻乾不眠加升麻葛根大黃芒硝乾薑附子俱可隨症加入古人六合四物湯論之詳矣一婦人有胎恐服藥有礙灶中黃土研末以水和塗於心下及臍下干則易之一受胎二三月必嘔噁心以月水不通陽明之氣壅盛上僣至四五月自愈如病甚用六君子湯加砂仁以和之方中半夏得參朮能安胎健胃不必顧忌一胎前下血名曰胎漏氣虛不攝血也多服補中益氣湯如因惱怒傷肝者宜加味逍遙散加生地一胎動不安血不養胎也宜四物湯去川芎加白朮杜仲若有火者再加黃芩如腹時痛多寒者加川椒此一味今人罕用金匱用以養胎一墮胎症屢患者必應期而墮總屬氣血大虛余昔惑于丹溪之說以黃芩白朮為安胎聖藥內子患此四年中連服五次皆墮後有老醫用四物湯加真鹿膠補骨脂菟絲子杜仲川續斷而安余始悟命門為人立命之本女以系胞必用溫藥熱藥始效趙氏醫貫用六味八味加艾葉阿膠大有灼見如不受溫藥峻劑者以杜仲八兩糯米湯泡炒勿焦取粉真桑上寄生人參五味子各四兩為末以黃耆一斤白朮大棗各六兩煮膏為丸米湯送下四錢一日兩服神效一子腫宜五皮散加白朮子嗽宜二陳湯加阿膠麥冬桑白皮五味子乾薑細辛子懸宜四物湯去川芎加黃芩白朮甘草子瀉宜補中益氣湯四君子湯加黃芩砂仁一臨産交骨不開宜四物去芍地加發炭三錢龜板五錢水煎服如血水大下而不産者是血乾而胎滯氣虛推送無力宜當歸補血湯加人參肉桂各一錢甚者去桂加附子三錢此法時醫不講一産後血暈用醋炭熏鼻老酒和童便飲之不可放倒如氣血脫而暈者必唇口手足厥冷以當歸補血湯加參附乾薑以回其陽甚者必用通脈四逆湯如認作血暈治之則死矣一胎衣不下用歸身五錢川芎三錢水煎服或血入衣中脹而不下宜清酒送下失笑散一産後發熱有外感者照常法治之如無外感用當歸補血湯一血塊痛宜四物倍當歸去地黃加牛膝桃仁肉桂青皮醋炒大黃下之一産後泄瀉不可利水只用補中益氣湯加減一産後大便不通宜八珍湯加桃仁杏仁一子宮下墜乃勞力所傷也宜補中益氣湯加附子玉門不閉治同一産後瘀血不行腹痛者宜當歸四錢川芎二錢炮姜炙草各一錢桃仁七枚名生化湯酒水各半煎一産後感風成痙口噤角弓反張無汗者名剛痙宜荊芥穗一兩以童便煎灌之或桂枝湯加葛根三錢有汗為柔痙宜桂枝加栝蔞根三錢二痙屬虛者以十全大補湯加柴胡鉤藤栝蔞竹瀝薑汁如汗多加附子一産後喘促口鼻起黑氣為瘀血入肺不治或用人參一兩蘇木三錢水煎頓服若厥冷自汗必用通脈四逆湯進二三劑厥回脈復可治婦人雜病一經水不調屬虛者乃衝任之血不足宜服歸脾湯二十劑再以海螵蛸四兩茜草一兩以雀卵為小丸空心以鮑魚汁送下一錢五分或無雀卵以雞肝代之當歸湯下亦可一經水不調屬實者自有實症實脈可驗宜四物湯加醋炒大黃香附桃仁丹皮青皮紅花之類一經水不調因鬱而致者宜加味逍遙散一婦人肥而不妊乃子宮脂滿宜四物湯去地黃加香附半夏貝母以益母膏為丸如瘦而不妊者乃氣血兩虛宜八珍湯加菟絲子川椒鹿茸杜仲為丸一婦人帶病皆由中土虧損帶脈不能收引以致十二經脈因而內陷也宜六君子湯加炮姜以補脾甚者以補中益氣湯以提之或以椿根皮黃柏牡蠣粉醋糊為丸間服以澀之傷寒傷寒以六經為主太陽陽明少陽為三陽太陰少陰厥陰為三陰病症百出無常總範圍於六經之內仲景所以為萬世師也昔人謂三百九十七法而不知其字字皆法也謂一百一十三方而不知一方可該數方不必如許之多方外有方不僅如是之少也余治雜病亦隨俗採取時方唯於傷寒一門非此方不能以治此病非此藥不可以名此方不敢少有遷就茲挈其要領先為入門之導再授以仲景書便知有下手工夫矣太陽為寒水之經主一身之表何謂太陽經症曰頭痛項強發熱惡寒是也一脈緩自汗惡風為虛邪宜桂枝湯如八九日過經不解如瘧狀面熱身癢以其不得小汗故也宜桂枝麻黃各半湯因前此未汗不得不發其汗因日數頗久故小發其汗如服桂枝湯大汗後形如瘧日再發者以餘邪未盡故也宜桂枝一麻黃一湯大汗之後不得再行大汗之法而餘邪未盡不可不從汗而竭之但藥品宜輕耳脈浮緊無汗惡寒為實邪宜麻黃湯如無汗煩躁者加石膏薑棗名大青龍湯如干嘔而咳去杏仁加五味子乾薑半夏細辛芍藥名為小青龍湯此二湯即麻黃湯之加減昔人以麻黃湯大青龍湯桂枝湯分三大綱何其謬歟按此二法治表中之表也時法冬月以加味香蘇飲代上二方三時感胃以九味羌活湯代上二方與仲景法不甚合然好尚如斯亦無可奈何耳何謂太陽腑症曰表邪不去必入於裡膀胱為表中之裡也有蓄水蓄血之辨一太陽症其人口渴煩躁不得眠脈浮小便不利水入即吐為膀胱蓄水症宜五苓散一太陽症其人如狂小腹硬滿小便自利脈沉為膀胱蓄血症古用抵當湯丸今畏其峻不敢用宜桃仁承氣湯按此二法治表中之裡也何謂太陽變症曰汗下失宜從陰從陽之不一也一不應下而下之續得下利清穀身疼痛宜四逆湯以救清穀之裡又以桂枝湯以救身疼痛之表一病發熱頭痛脈反沉若不瘥身體疼痛當救其里宜四逆湯一大汗大下利而厥冷者四逆湯主之太陽病發汗太過遂漏不止其人惡風小便難四肢微急難以屈伸桂枝加附子湯主之一太陽病發汗太過動其營血而衛邪反內伏其人仍發熱心下悸頭眩身瞤動振振欲劈地者少陰症誤用大青龍湯同例真武湯主之以上言汗下太過傷正而虛其陽陽虛則從少陰陰化之症多以太陽少陰為表裡也一陽盛於內誤服桂枝湯大汗出後大煩十渴不解脈洪大者白虎加人參湯主之一傷寒若吐若下後七八日不解熱結在裡表裡俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者白虎加人參湯主之一傷寒不大便六七日為里症頭痛有熱為表症外不解由於內不通也下之里和而表自解矣與承氣湯病人煩熱汗出則解又加瘧狀日晡所發熱屬陽明也脈實者宜下之與大承氣湯脈虛者宜發汗與桂枝湯一發汗後惡寒者虛故也不惡寒但熱者實也當和胃氣與調胃承氣湯一太陽病未解脈陰陽俱停停者沉滯不起也陰陽者尺寸也先振栗汗出乃解但陽脈微者先汗而解但陰脈微者下之而解若欲下之宜調胃承氣湯脈微不可汗下此微字即上文停字也以上言汗下失宜熱熾而傷其陰陰傷則從陽明陽化之症多以大腸陽明遞相傳也何謂發汗利水為治太陽兩大門曰邪傷太陽病在寒水之經也驅其水氣以外出則為汗逐其水氣以下出後為黃涎蓄水前為小便長太陽為寒水之經邪之初傷必須發汗麻黃湯發皮膚之汗桂枝湯發經絡之汗葛根湯發肌肉之汗小青龍湯發心下之汗大青龍湯發其內擾胸中之陽氣而為汗此發汗之五法也若汗之而不能盡者則為水水在心下乾嘔而咳宜小青龍湯發熱而煩渴欲飲水水入即吐名曰水逆宜五苓散汗後心下痞硬乾噫食臭脅下有水氣腹中雷鳴下利者病勢雖在腹中而病根猶在心下宜生薑瀉心湯此水氣在上焦在上者汗而散之也若妄下之後自心上至小腹硬滿而痛不可近水與氣所結脈遲名大結胸宜大陷胸湯若項亦強如柔痓之狀宜大陷胸丸程郊倩謂病勢連甚於下者主以湯病勢連甚於上者主以丸是也若其結止在心下按之始痛脈浮滑名小結胸邪氣尚在脈絡宜小陷胸湯若無熱症名寒實結胸宜三物白散若心下痞硬滿引脅下痛乾嘔短氣汗出不惡寒三焦升降之氣阻格難通宜十棗湯此水氣在中焦中滿瀉之於內也若頭痛項強翕翕發熱無汗心下滿微痛小便不利者因膀胱之水不行營衛不調不能作汗宜以桂枝去桂加茯苓白朮湯治之是水氣在下焦在下者引而竭之是也陽明主裡外候肌肉內候胃中何謂陽明經症曰身熱目痛鼻乾不得眠反惡熱是也有未罷太陽已罷太陽之辨若兼見頭痛惡寒是太陽症未罷自汗脈緩宜桂枝湯項背𠘧𠘧者桂枝加葛根湯主之無汗脈浮宜麻黃湯項背𠘧𠘧者葛根湯主之若無頭痛惡寒但見壯熱口渴是已罷太陽為陽明經之本症宜白虎湯主之何謂陽明腑症曰潮熱譫語手足腋下濈然汗出腹滿大便硬是也有太陽陽明少陽陽明正陽明之辨本太陽症治之失法亡其津液致太陽之熱乘胃燥而轉屬陽明其症小便數大便硬傷寒論謂之脾約宜麻仁湯以上太陽陽明本少陽病治之失法亡其津液致少陽之邪乘胃燥而轉屬陽明為大便結燥傷寒論謂為大便難以蜜煎膽汁導之以上少陽陽明病人陽氣素盛或有宿食外邪傳入遂歸於胃腑傷寒論謂為胃家實宜以三承氣湯下之以上正陽陽明愚按陽明在經未離太陽宜汗之既離太陽宜清之在腑審其輕重下之若在經腑之界汗之不可清之不可下之不可宜用吐法柯韻伯云除胃實症其餘如虛熱咽乾口乾口苦舌苔腹滿煩躁不得臥消渴而小便不利凡在胃之外者悉是陽明表症仲景制汗劑是開太陽表邪之出路制吐劑是引陽明表邪之出路當以梔子豉湯吐之使心腹之濁邪上出於口一吐則心腹得舒表裡之煩熱悉除矣煩熱既除則胃外清自不致胃中之實所以為陽明解表之聖劑少陽主半表半裡何謂少陽經症曰口苦咽乾目眩是也有虛火實火之辨寒熱往來於外胸脅苦滿默默不欲食心煩喜嘔為虛火症宜小柴胡湯寒熱往來於外心中痞硬鬱郁微煩嘔不止為實火症宜大柴胡湯何謂少陽腑症曰少陽主寒熱屬於半表則為經屬於半里則為腑其症雖無寒熱往來於外而有寒熱相搏於中有痞痛利嘔四症之辨因嘔而痞不痛者半夏瀉心湯胸中有熱而欲嘔胃中有邪氣而腹中痛宜黃連湯邪已入里則膽火下攻於脾而自利宜黃芩湯膽火上逆於胃而為嘔宜黃芩加半夏生薑湯以上四方寒熱攻補並用仍不離少陽和解法傳經發明按宋元以後醫書皆謂邪從三陽傳入俱是熱症唯有下之一法論中四逆白通理中等方俱為直中立法何以謂之直中謂不從三陽傳入徑入三陰之臟唯有溫之一法凡傳經俱為熱症寒邪有直中而無傳經數百年來相沿之說也余向亦深信其然及臨症之久則以為不然直中二字傷寒論雖無明文而直中之病則有之有初病即見三陰寒症者即宜大溫之有初病即見三陰熱症者即宜大涼之大下之是寒熱俱有直中世謂直中皆為寒症者非也有謂遞次傳入三陰盡無寒症者亦非也蓋寒熱二氣盛則從化余揆其故則有二一從病體而分一從誤藥而變何則人之形有厚薄氣有盛衰臟有寒熱所受之邪每從其人之臟氣而為熱化寒化今試譬之於酒酒取諸水泉寒物也酒釀以曲糵又熱物也陽臟之人過飲之不覺其寒第覺其熱熱性迅發則吐血面瘡諸熱症作矣陰臟之人過飲之不覺其熱但覺其寒寒性凝滯則停飲腹脹泄瀉諸寒症作矣知此愈知寒熱之化由病人之體而分也何謂誤藥而變凡汗下失宜過之則傷正而虛其陽不及則熱熾而傷其陰虛其陽則從少陰陰化之症多以太陽少陰相表裡也傷其陰則從陽明陽化之症以太陽陽明遞相傳也所謂寒化熱化由誤治而變者此也至云寒邪不相傳更為不經之說仲景云下利腹脹滿身體疼痛者先溫其里乃攻其表溫里宜四逆湯攻表宜桂枝湯此三陽陽邪傳入三陰邪從陰化之寒症也如少陰症下利白通湯主之此太陰寒邪傳入少陰之寒症也如下利清穀裡寒外熱汗出而厥者通脈四逆湯主之此少陰寒邪傳入厥陰之寒症也誰謂陰不相傳無陽從陰化之理乎太陰為濕土純陰之臟也病入太陰從陰化者多從陽化者少何謂太陰之邪從陰化傷寒論云腹滿吐食自利不渴手足自溫時腹自痛是也宜理中湯丸主之不愈宜四逆輩何謂太陰之邪從陽化傷寒論云發汗復不解腹痛急下之宜大承氣湯是也又曰腹滿時痛屬太陰也時痛者謂腹時痛時止桂枝加芍藥湯主之大實痛者大便堅實而痛桂枝加大黃湯主之少陰腎中水火同具邪傷其經或從水化而為寒或從火化而為熱二症俱以脈沉細但欲寐為提綱何謂少陰之邪從水化而為寒曰脈沉細而微但欲寐背惡寒口中和腹痛下利清穀小便白是也宜用回陽法而回陽中首重在溫劑又有交陰陽微發汗共成三法少陰病寒邪始傷是當無熱而反發熱為太陽之摽陽外呈脈沉為少陰之生氣不升恐陰陽內外不相接故以熟附助太陽之表陽而內合於少陰麻辛啓少陰之水陰而外合於太陽仲景麻黃附子細辛湯非發汗法乃交陰陽法以上交陰陽法少陰病自始得以至於二三日俱無里症可知太陽之表熱非汗不解而又恐傷汗以傷腎液另出加減法取中焦水穀之津而為汗則內不傷陰邪從表解矣仲景麻黃附子甘草湯變陰陽法而為微微發汗法以上微發汗法手足厥冷吐利小便復利下利清穀內寒外熱脈微欲絶者宜四逆湯裡寒外熱面赤或腹痛或乾嘔或咽痛利止脈不出汗出而厥宜通脈四逆湯少陰下利宜白通湯利不止厥逆無脈乾嘔煩白通加豬膽汁湯主之服藥後脈暴出者死微續者生汗下後不解煩躁者茯苓四逆湯主之少陰病二三日不已至四五日腹痛小便不利四肢沉重疼痛自下利此為水氣咳小便利下利嘔四症或有或無因症下藥宜真武湯少陰病得之二三日口中和其背寒者太陽之陽虛不與少陰之君火相合當灸之又身體痛君火之氣不能周遍於一身手足寒君火之氣不能充達於四肢骨節痛君火之神機不能遊行以出入脈沉者君火之神機不能自下而上一為陽虛責在太陽之陽氣虛不能內合一為陰虛責在少陰之君火內虛神機不轉千古醫家輒云陰虛陽虛其一悟此理否皆以附子湯主之少陰病吐利神機不能交會於中土手足逆冷中上氣虛不能達於四肢煩躁欲死者少陰神機挾寒而逆於經脈心脈不能下交於腎則煩腎脈不能上通於心則躁吳茱萸湯主之以上用溫劑法何謂少陰之邪從火化而為熱曰脈沉細而數仍欲寐而內煩外躁或不臥口中熱下利清水小便赤是也宜用救陰法而救陰中又有補正攻邪之異少陰病二三日咽痛者可與甘草湯不瘥與桔梗湯少陰病咽中傷生瘡不能言語聲不出者苦酒湯主之少陰病咽中痛半夏散及湯主之少陰病下利咽痛胸滿心煩者豬膚湯主之少陰病得之二三日以上心中煩不得臥黃連阿膠湯主之少陰病下利六七日咳而嘔渴心煩不得眠者朱苓湯主之少陰病二三日至四五日腹痛小便不利下利便膿血桃花湯主之以上皆以補正為救陰法少陰病得之二三日口燥舌乾者急下之宜大承氣湯柯注云熱淫於內因而轉屬陽明胃火上炎故口燥舌乾急下之穀氣下流津液得升矣少陰病六七日腹脹不大便者急下之宜大承氣湯柯注云得病六七日當解不解津液枯涸因轉屬陽明故腹脹不大便宜於急下者六七日來陰虛已極恐土實於中心腎不交而死也少陰病自利清水色純青心下必痛口乾燥者急下之宜大承氣湯柯注云是土燥火炎脾氣不濡胃氣反厚水去而谷不去故宜急下以上皆以攻邪為救陰法厥陰為風木之臟從熱化者多從寒化者少以木中有火故也何謂厥陰症傷寒論云厥陰之為病消渴火盛氣上撞心氣逆即火逆心中疼熱火邪入心飢火能消物而不欲食木克二故食則吐蛔蟲為風化一聞食臭則上大於膈而吐下之利不止誤下傷胃是也柯注云兩陰交盡名厥陰宜無熱症然厥陰主肝而膽藏於內則厥陰熱症皆少陽之火內發也要知少陽厥陰同一相火相火鬱於內是厥陰病相火出於表為少陽病少陽咽乾即厥陰消渴之機胸脅苦滿即氣上衝心之兆心煩即疼痛之初不欲食是飢不欲食之根喜嘔即吐蛔之漸故少陽不解轉屬厥陰為病危厥陰病衰轉屬少陽為欲愈一烏梅丸為厥陰症之總方吐蛔久利尤隹一病初起手足厥冷脈微欲絶宜當歸四逆湯有久寒加生薑吳茱萸酒水各半煎以相火寄於肝經雖寒而臟不寒故先厥者後必發熱手足愈冷肝膽愈熱故云厥深熱亦深也姜附不可妄投一脈結脈緩時一止日結活人云陰盛則結代一臟氣敗其脈動而中止不能自還而他臟代之心動悸心氣不寧炙甘草湯主之愚按他經亦有此症是陽氣大虛虛極生寒非姜附肉桂不為功若用此藥是速其化也惟厥陰症肝中之相火本少陽之生氣而少陽實出坎宮之真陰即經所謂陽豫之正陰為之主是也按前言表症而手足厥逆此言里症而脈結代雖為厥陰寒化終不用姜附大熱之品以厥陰之臟相火遊行於其間故也雖脈微欲絶不可下若脈滑而厥是內熱鬱閉所謂厥應下之是也下之是下其熱非下其實泄利下重者四逆散欲飲水數升者白虎湯皆所以下無形之邪也若以承氣下之利不止矣一熱利下重者白頭翁湯主之下利欲飲水者熱也白頭翁湯主之以上治熱化之法一厥者必發熱熱與厥相應熱深厥亦深熱微厥亦微此四症是厥陰傷寒之定局先熱後厥厥熱往來厥多熱少熱多厥少此四症是厥陰傷寒之變局皆因其人陽氣多少而然一乘脾乘肺二症宜辨一曰傷寒腹滿經云諸腹脹大皆屬於熱此由肝火也譫語經云肝氣盛則多言寸口脈浮而緊即弦脈此肝乘脾也名曰縱刺期門一曰傷寒發熱嗇嗇惡寒肺主皮毛此症因無頭痛項強知其非太陽病為肺虛渴欲飲水無白虎症而欲飲知為肺虛腹滿無承氣症而腹滿知肺虛不能通調水道此肝乘肺也肺金虛不能制木肺寡於畏侮所不勝也名曰橫刺期門肝有立火隨其實而瀉之一傷寒陽脈澀陰脈弦法當腹中急痛此亦肝乘脾也先與小建中湯平肝以補脾不瘥者中氣虛而不振邪尚流連與小柴胡湯主之令木邪直走少陽使有出路所謂陰出之陽則愈也一傷寒厥而心下悸者宜先治水當服茯苓甘草湯卻治其厥不爾水清入胃必作利也柯注云此亦肝乘肺也雖不發熱惡寒亦木實金虛水氣不利所致上節腹滿是水在中焦故刺期門以泄其實此水在上焦故用茯苓甘草以發其汗此方是化水為汗發散內邪之劑即厥陰治厥之劑也太陽方桂枝湯桂枝白芍各三錢甘草二錢炙生薑三錢切片大棗四枚水二杯煎八分溫服服後少頃啜粥一杯以助藥力溫覆微似汗若一服病止不必再服若病重者一日夜作三服麻黃湯麻黃三錢去根節桂枝二錢杏仁去皮尖二十三枚甘草一錢水三杯先煮麻黃至二杯吹去上沫納諸藥煎八分溫服不須啜粥余將息如前法大青龍湯麻黃六錢去根節桂枝二錢甘草二錢炙杏仁去皮尖十二枚生薑三錢切片大棗四枚石膏碎以棉裹四錢五分水四杯先煮麻黃至二杯半去上沫納諸藥再煮八分溫服溫覆取微似汗汗出多者以溫粉撲之白朮煅牡蠣龍骨研末若汗多亡陽者以真武湯救之小青龍湯麻黃去根節白芍乾薑不炒甘草桂枝各二錢半夏三錢五味子一錢細辛八分水三杯半先煮麻黃至二杯半去沫納諸藥煎八分溫服若渴者去半夏加栝蔞根二錢若噎者去麻黃加附子一錢五分小便不利小腹痛滿去麻黃加茯苓四錢若喘者去麻黃加杏仁二十一枚按論云若微利者去麻黃加芫花今芫花不常用時法用茯苓四錢代之即豬苓澤瀉亦可代也但行道人當於方後注明桂枝二麻黃一湯桂枝麻黃各半湯按近傳傷寒論有分兩理宜兩湯各煎聽用如各半湯則各取其半而合服之如二一湯則取桂枝湯二分麻黃湯一分合而服之猶水陸之師各有節制兩軍相為表裡異道夾攻之義後人等其分兩合為一方與葛根青龍輩何異五苓散澤瀉一兩六株豬苓茯苓白朮各十八株桂枝半兩共為末以米飲和服二錢五分日三服多飲暖水以出汗抵當湯水蛭熬虻蟲去翅足熬各十二個大黃三錢桃仁七個水一杯半煎七分服不下再服桃仁承氣湯桃仁十六粒去皮尖大黃四錢甘草桂枝各二錢芒硝二錢水二杯煎八分去滓入芒硝煎微沸溫服四逆湯真武湯俱見下少陰桂枝加附子湯白虎加人參湯即白虎湯加人參一錢調胃承氣湯大承氣湯即見下陽明生薑瀉心湯生薑二錢炙草人參黃芩各一錢五分半夏一錢乾薑黃連各五分水煎服大陷胸湯大黃二錢芒硝一錢甘遂末三分水一杯先煮大黃至六分去滓入芒硝煮二沸納甘遂末服得快勿再服大陷胸丸大黃四錢葶藶子熬芒硝杏仁各一錢五分搗為丸如彈子大每用一丸入甘遂末三分白蜜半匙水一杯煎半杯溫服一宿乃下如不下更服以下為度小陷胸湯黃連一錢半夏二錢栝蔞實二錢水一杯半先煮栝蔞至一杯入二味再煎至七分服微下黃涎三物白散桔梗貝母各四錢二分巴豆一錢二分去心熬黑共為末以白飲和服一錢一分羸者七分病在膈上必吐在膈下必利不利進熱粥一杯利不止進冷粥一杯十棗湯芫花熬甘遂大戟各等分異篩稱末合和之水二杯半煮大棗十枚至七分去滓強人納藥末七八分羸人五六分平旦服若下少病不除明日更服加三分利後糜粥自養桂枝去桂加茯苓白朮湯芍藥生薑茯苓白朮各三錢炙草二錢大棗四枚水煎溫服小便利則愈陽明方桂枝加葛根湯即桂枝湯加葛根四錢水三杯半先煮葛根至二杯半吹去沫入諸藥煎至八分溫服不須啜粥葛根湯葛根四錢麻黃三錢生薑三錢甘草二錢桂枝二錢大棗四枚白芍二錢水三鍾半先煮麻黃葛根至二鍾去沫入諸藥至八分溫服微似汗不須啜粥梔子豉湯梔子七枚生用香豉三錢水三